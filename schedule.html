/* ════════════════════════════════════════════
   DRAG-AND-DROP REORDER / TRANSFER + SAVE
════════════════════════════════════════════ */

/* ── Annotate each upgrade with original position info ── */
function annotateOriginalPositions() {
  ganttData.forEach(b => {
    const hasSynth = b.upgrades.length > 0 && b.upgrades[0]._synthetic;
    b.upgrades.forEach((upg, idx) => {
      if (upg._uid) return; // preserve existing annotation across re-renders
      upg._origBuilderNum = b.builderNum;
      upg._origIdx        = idx;
      upg._uid            = `${b.builderNum}:${idx}:${(upg.upgrade||'').slice(0,14).replace(/\s/g,'_')}`;
      // _sheetRow: 1-based sheet row. Sheet row 2 = active, rows 3+ = queue items.
      // Synthetic prepend shifts indices but NOT sheet rows — queue items always at idx+2.
      upg._sheetRow = upg._synthetic ? null : idx + 2;
    });
  });
  originalGanttData = ganttData.map(b => ({ builderNum: b.builderNum, upgrades: b.upgrades.map(u => ({ ...u })) }));
}

/* ── Save button state ── */
function setSaveState(dirty) {
  hasPendingChanges = dirty;
  document.querySelectorAll('.save-btn').forEach(btn => {
    btn.disabled = !dirty;
    btn.classList.toggle('has-changes', dirty);
    if (!dirty) btn.textContent = btn.id === 'saveBtnMobile' ? '💾 Save' : '💾 Save Order';
  });
}

/* ── Back / unsaved guard ── */
function goBack() {
  if (hasPendingChanges && !confirm('You have unsaved reorder changes. Leave and discard them?')) return;
  window.location.href = 'index.html';
}

/* ── Create floating ghost ── */
function createGhost(rect, builderNum, upg) {
  const ghost = document.createElement('div');
  ghost.className = 'drag-ghost';
  const w = Math.min(Math.max(rect.width, 130), 230);
  const h = Math.max(rect.height, 36);
  ghost.style.cssText = `width:${w}px; height:${h}px; left:${rect.left + (rect.width - w) / 2}px; top:${rect.top}px; background:${BUILDER_COLORS[builderNum]};`;
  const img = document.createElement('img');
  img.src = getUpgradeImage(upg.upgrade);
  img.onerror = () => { img.src = 'Images/Upgrades/PH.png'; };
  img.style.cssText = `width:${h - 8}px; height:${h - 8}px;`;
  const lbl = document.createElement('span');
  lbl.textContent = (upg.upgrade || '?').slice(0, 22);
  ghost.append(img, lbl);
  document.body.appendChild(ghost);
  return ghost;
}

/* ── Drop preview + bar-shift simulation state ── */
let _dropPreviewEl    = null;
let _lastPreviewKey   = null;
let _simOrigPositions = new Map(); /* uid → {left, top, width, height} */

function clearDropPreview() {
  if (_dropPreviewEl) { _dropPreviewEl.remove(); _dropPreviewEl = null; }
  _lastPreviewKey = null;
  restoreSimulatedBarPositions();
}

/* Restore all bars that were shifted during simulation */
function restoreSimulatedBarPositions() {
  _simOrigPositions.forEach((orig, uid) => {
    const bar = document.querySelector(`.gantt-bar[data-upg-uid="${uid}"], .mobile-bar[data-upg-uid="${uid}"]`);
    if (!bar) return;
    if (orig.left   !== null) bar.style.left   = orig.left;
    if (orig.top    !== null) bar.style.top     = orig.top;
    if (orig.width  !== null) bar.style.width   = orig.width;
    if (orig.height !== null) bar.style.height  = orig.height;
  });
  _simOrigPositions.clear();
}

/* Simulate the drop for targetBuilder — returns ALL items with new _startDate/_endDate */
function computeDropSimulation(targetBuilder, clientX, clientY) {
  if (!dragState) return [];
  const { upg, fromBuilderNum } = dragState;
  const tgtB = ganttData.find(b => b.builderNum === targetBuilder);
  if (!tgtB) return [];

  let cloned = tgtB.upgrades.map(u => ({ ...u }));

  if (targetBuilder === fromBuilderNum) {
    const si = cloned.findIndex(u => u._uid === upg._uid);
    if (si !== -1) cloned.splice(si, 1);
  }

  const beforeUid    = insertBeforeUid(targetBuilder, clientX, clientY);
  const tgtActiveIdx = cloned.findIndex(u => u._isCurrent || u._synthetic);
  const minInsert    = tgtActiveIdx === -1 ? 0 : tgtActiveIdx + 1;
  let insertAt       = beforeUid ? cloned.findIndex(u => u._uid === beforeUid) : -1;
  if (insertAt !== -1 && insertAt <= tgtActiveIdx) insertAt = minInsert;

  /* simUpg is a copy that shares _uid with the real dragged item */
  const simUpg = { ...upg };
  if (insertAt === -1) cloned.push(simUpg);
  else cloned.splice(Math.max(insertAt, minInsert), 0, simUpg);

  /* Simulate restitch */
  const activeIdx = cloned.findIndex(u => u._isCurrent);
  let cursor = activeIdx !== -1 && cloned[activeIdx]._endDate instanceof Date
    ? new Date(cloned[activeIdx]._endDate) : new Date();
  const start = activeIdx !== -1 ? activeIdx + 1 : 0;
  for (let i = start; i < cloned.length; i++) {
    const u = cloned[i];
    u._startDate = new Date(cursor);
    u._endDate   = new Date(cursor.getTime() + (u.durationMinutes || 0) * 60000);
    cursor = u._endDate;
  }
  return cloned;
}

/* Apply simulated positions to existing DOM bars (animate them to new spots) */
function applySimulatedBarPositions(targetBuilder, simItems) {
  const isMobile     = window.innerWidth <= 768;
  const isMobileVert = isMobile && mobileOrientation === 'vertical';
  const PXv = Math.max(Math.round(110 * ganttZoom), 20);
  const PXh = Math.max(Math.round(140 * ganttZoom), 20);

  simItems.forEach(simU => {
    if (!simU._uid || !simU._startDate || !simU._endDate) return;
    /* Skip the dragged item itself — its visual is the ghost + preview element */
    if (dragState && simU._uid === dragState.upg._uid) return;

    let bar;
    if (isMobileVert) {
      bar = document.querySelector(`#mobileColumns .mobile-builder-col[data-builder="${targetBuilder}"] .mobile-bar[data-upg-uid="${simU._uid}"]`);
    } else {
      const scope = isMobile ? '#mobileColumns' : '#ganttDesktop';
      bar = document.querySelector(`${scope} [data-builder="${targetBuilder}"] .gantt-bar[data-upg-uid="${simU._uid}"]`);
    }
    if (!bar) return;

    /* Save original position (only once per uid) */
    if (!_simOrigPositions.has(simU._uid)) {
      _simOrigPositions.set(simU._uid, {
        left:   bar.style.left   || null,
        top:    bar.style.top    || null,
        width:  bar.style.width  || null,
        height: bar.style.height || null
      });
    }

    /* Move bar to simulated position */
    if (isMobileVert) {
      const topPx = daysBetween(todayStart, simU._startDate) * PXv;
      const hPx   = Math.max(daysBetween(simU._startDate, simU._endDate) * PXv, 8);
      bar.style.top    = topPx + 'px';
      bar.style.height = hPx   + 'px';
    } else {
      const leftPx  = daysBetween(todayStart, simU._startDate) * PXh;
      const widthPx = Math.max(daysBetween(simU._startDate, simU._endDate) * PXh, 6);
      bar.style.left  = leftPx  + 'px';
      bar.style.width = widthPx + 'px';
    }
  });
}

function updateDropPreview(targetBuilder, clientX, clientY) {
  const beforeUid = insertBeforeUid(targetBuilder, clientX, clientY);
  const key = `${targetBuilder}:${beforeUid}`;
  if (key === _lastPreviewKey && _dropPreviewEl) return; /* no positional change */
  _lastPreviewKey = key;

  /* Remove old preview element and restore bar positions before re-applying */
  if (_dropPreviewEl) { _dropPreviewEl.remove(); _dropPreviewEl = null; }
  restoreSimulatedBarPositions();

  /* Compute new simulation */
  const simItems = computeDropSimulation(targetBuilder, clientX, clientY);
  const simUpg   = simItems.find(u => u._uid === dragState?.upg?._uid);
  if (!simUpg || !simUpg._startDate || !simUpg._endDate) return;

  /* Shift all OTHER bars to their new simulated positions */
  applySimulatedBarPositions(targetBuilder, simItems);

  /* Create preview element for the DRAGGED item's new position */
  const isMobile     = window.innerWidth <= 768;
  const isMobileVert = isMobile && mobileOrientation === 'vertical';
  const bColor       = BUILDER_COLORS[targetBuilder];
  const preview      = document.createElement('div');
  preview.className  = 'drop-preview';

  const pImg = document.createElement('img');
  pImg.src = getUpgradeImage(dragState.upg.upgrade);
  pImg.onerror = () => { pImg.src = 'Images/Upgrades/PH.png'; };
  pImg.style.cssText = 'object-fit:contain; display:block; margin:auto;';

  if (isMobileVert) {
    const colBody = document.querySelector(`#mobileColumns .mobile-builder-col[data-builder="${targetBuilder}"] .mobile-col-body`);
    if (!colBody) return;
    const PXv   = Math.max(Math.round(110 * ganttZoom), 20);
    const topPx = daysBetween(todayStart, simUpg._startDate) * PXv;
    const hPx   = Math.max(daysBetween(simUpg._startDate, simUpg._endDate) * PXv, 8);
    preview.style.cssText = `left:4px; right:4px; top:${topPx}px; height:${hPx}px; border:2px dashed ${bColor}; background:${hexAlpha(bColor, 0.28)};`;
    pImg.style.cssText += ` width:${Math.min(hPx-8,36)}px; height:${Math.min(hPx-8,36)}px; padding-top:${Math.max((hPx-44)/2,2)}px;`;
    preview.appendChild(pImg);
    colBody.appendChild(preview);
  } else {
    const PXh    = Math.max(Math.round(140 * ganttZoom), 20);
    const rowEl  = isMobile
      ? document.querySelector(`#mobileColumns [data-builder="${targetBuilder}"]`)
      : document.querySelector(`#ganttDesktop [data-builder="${targetBuilder}"]`);
    if (!rowEl) return;
    const cellEl = Array.from(rowEl.children).find(c => c.style.flex === '1' || c.style.position === 'relative') || rowEl.lastElementChild;
    if (!cellEl) return;
    const RH     = parseInt(rowEl.style.height) || 62;
    const BT     = Math.round(RH * 0.09);
    const BH     = RH - BT * 2;
    const leftPx = daysBetween(todayStart, simUpg._startDate) * PXh;
    const wPx    = Math.max(daysBetween(simUpg._startDate, simUpg._endDate) * PXh, 20);
    preview.style.cssText = `left:${leftPx}px; width:${wPx}px; top:${BT}px; height:${BH}px; border:2px dashed ${bColor}; background:${hexAlpha(bColor, 0.28)}; display:flex; align-items:center; justify-content:center;`;
    pImg.style.cssText += ` width:${Math.min(BH-6,wPx-6)}px; height:${BH-6}px;`;
    preview.appendChild(pImg);
    cellEl.appendChild(preview);
  }
  _dropPreviewEl = preview;
}

/* ── Start drag ── */
function startDrag(e, builderNum, upg, barEl) {
  if (!dragModeEnabled || !upg || upg._isCurrent || upg._synthetic || dragState) return;
  const touch   = e.touches?.[0];
  const clientX = touch ? touch.clientX : e.clientX;
  const clientY = touch ? touch.clientY : e.clientY;
  dragState = { upg, fromBuilderNum: builderNum, ghost: null, origBarEl: barEl,
    lastX: clientX, lastY: clientY, startX: clientX, startY: clientY,
    committed: false, hoverBuilderNum: null };
  if (!touch) {
    dragState.committed = true;
    dragState.ghost     = createGhost(barEl.getBoundingClientRect(), builderNum, upg);
    barEl.style.opacity = '0.3';
    document.body.style.userSelect = 'none';
    document.body.classList.add('sim-active');
    e.preventDefault();
  }
}

/* ── Find builder number at screen coords ── */
function builderRowAt(x, y) {
  const g = dragState?.ghost;
  if (g) g.style.display = 'none';
  const el = document.elementFromPoint(x, y);
  if (g) g.style.display = '';
  if (!el) return null;
  const row = el.closest('[data-builder]');
  return row ? parseInt(row.dataset.builder) : null;
}

/* ── Find uid of upgrade to insert BEFORE (null = end) ──
   Uses DATA positions (ganttData dates → pixel math) instead of DOM positions so
   the result is unaffected by simulated bar shifts during drag preview. */
function insertBeforeUid(builderNum, clientX, clientY) {
  const isMobile     = window.innerWidth <= 768;
  const isMobileVert = isMobile && mobileOrientation === 'vertical';
  const bd = ganttData.find(b => b.builderNum === builderNum);
  if (!bd) return null;

  /* Draggable upgrades in chronological order, excluding the bar being dragged */
  const draggable = bd.upgrades.filter(u =>
    !u._isCurrent && !u._synthetic && u._uid &&
    u._uid !== dragState?.upg?._uid && u._startDate && u._endDate
  );

  if (isMobileVert) {
    const PX = Math.max(Math.round(110 * ganttZoom), 20);
    const colBody = document.querySelector(
      `#mobileColumns .mobile-builder-col[data-builder="${builderNum}"] .mobile-col-body`);
    if (!colBody) return null;
    const offsetTop = colBody.getBoundingClientRect().top;
    const localY = clientY - offsetTop;
    for (const upg of draggable) {
      const topPx = daysBetween(todayStart, upg._startDate) * PX;
      const hPx   = Math.max(daysBetween(upg._startDate, upg._endDate) * PX, 8);
      if (localY < topPx + hPx / 2) return upg._uid;
    }
  } else if (isMobile) {
    const PX = Math.max(Math.round(140 * ganttZoom), 20);
    const rowEl = document.querySelector(`#mobileColumns [data-builder="${builderNum}"]`);
    if (!rowEl) return null;
    const cellEl = Array.from(rowEl.children).find(c =>
      c.style.flex === '1' || c.style.position === 'relative') || rowEl.lastElementChild;
    if (!cellEl) return null;
    const offsetLeft = cellEl.getBoundingClientRect().left;
    const localX = clientX - offsetLeft;
    for (const upg of draggable) {
      const leftPx = daysBetween(todayStart, upg._startDate) * PX;
      const wPx    = Math.max(daysBetween(upg._startDate, upg._endDate) * PX, 6);
      if (localX < leftPx + wPx / 2) return upg._uid;
    }
  } else {
    const PX = Math.max(Math.round(140 * ganttZoom), 20);
    const rowEl = document.querySelector(`#ganttDesktop [data-builder="${builderNum}"]`);
    if (!rowEl) return null;
    const cellEl = Array.from(rowEl.children).find(c =>
      c.style.flex === '1' || c.style.position === 'relative') || rowEl.lastElementChild;
    if (!cellEl) return null;
    const offsetLeft = cellEl.getBoundingClientRect().left;
    const localX = clientX - offsetLeft;
    for (const upg of draggable) {
      const leftPx = daysBetween(todayStart, upg._startDate) * PX;
      const wPx    = Math.max(daysBetween(upg._startDate, upg._endDate) * PX, 6);
      if (localX < leftPx + wPx / 2) return upg._uid;
    }
  }
  return null; // insert at end
}

/* ── Vertical edge-scroll rAF loop (runs outside touchmove so iOS doesn't block it) ── */
function _edgeScrollTick() {
  if (!dragState || _edgeScrollDeltaY === 0) { _edgeScrollRafId = null; return; }
  window.scrollBy(0, _edgeScrollDeltaY);
  _edgeScrollRafId = requestAnimationFrame(_edgeScrollTick);
}
function startEdgeScrollLoop() {
  if (_edgeScrollRafId) return;
  _edgeScrollRafId = requestAnimationFrame(_edgeScrollTick);
}

/* ── Drag move ── */
function onDragMove(clientX, clientY) {
  if (!dragState) return;
  if (!dragState.committed) {
    if (Math.hypot(clientX - dragState.startX, clientY - dragState.startY) < 8) {
      dragState.lastX = clientX; dragState.lastY = clientY; return;
    }
    dragState.committed = true;
    dragState.ghost     = createGhost(dragState.origBarEl.getBoundingClientRect(), dragState.fromBuilderNum, dragState.upg);
    dragState.origBarEl.style.opacity = '0.3';
    document.body.style.userSelect    = 'none';
    document.body.classList.add('sim-active');
  }
  const dx = clientX - dragState.lastX, dy = clientY - dragState.lastY;
  dragState.ghost.style.left = (parseFloat(dragState.ghost.style.left) + dx) + 'px';
  dragState.ghost.style.top  = (parseFloat(dragState.ghost.style.top)  + dy) + 'px';
  dragState.lastX = clientX; dragState.lastY = clientY;

  /* Edge auto-scroll so the user can drag to items off-screen */
  const EDGE = 80, SPD = 14;
  if (window.innerWidth <= 768) {
    const col = document.getElementById('mobileColumns');
    /* Both orientations: scroll mobileColumns horizontally at left/right edges */
    if (col) {
      if      (clientX < 90)                        col.scrollLeft -= SPD;
      else if (clientX > window.innerWidth - 50)    col.scrollLeft += SPD;
    }
    /* Vertical mode: also page-scroll up/down via rAF loop so it works on iOS
       even though touchmove calls e.preventDefault().
       Top threshold is larger to account for the sticky header stack (~220px) */
    if (mobileOrientation === 'vertical') {
      const EDGE_TOP = 220;
      if      (clientY < EDGE_TOP)                   _edgeScrollDeltaY = -SPD;
      else if (clientY > window.innerHeight - EDGE)  _edgeScrollDeltaY =  SPD;
      else                                           _edgeScrollDeltaY =  0;
      if (_edgeScrollDeltaY !== 0 && !_edgeScrollRafId) startEdgeScrollLoop();
    }
  } else {
    /* Desktop: scroll ganttWrap horizontally + page vertically near edges */
    const wrap = document.getElementById('ganttWrap');
    if (wrap) {
      const D_EDGE = 130, D_SPD = 20;
      const rect = wrap.getBoundingClientRect();
      if      (clientX < rect.left  + D_EDGE) wrap.scrollLeft -= D_SPD;
      else if (clientX > rect.right - D_EDGE) wrap.scrollLeft += D_SPD;
      if      (clientY < D_EDGE)              window.scrollBy(0, -D_SPD);
      else if (clientY > window.innerHeight - D_EDGE) window.scrollBy(0, D_SPD);
    }
  }

  const target = builderRowAt(clientX, clientY);
  document.querySelectorAll('.row-drop-target').forEach(el => el.classList.remove('row-drop-target'));
  if (target !== null) {
    document.querySelectorAll(`[data-builder="${target}"]`).forEach(el => el.classList.add('row-drop-target'));
    dragState.hoverBuilderNum = target;
    updateDropPreview(target, clientX, clientY);
  } else {
    clearDropPreview();
  }
}

/* ── Drag end / drop ── */
function onDragEnd(clientX, clientY) {
  if (!dragState) return;
  /* Stop vertical edge-scroll rAF loop */
  _edgeScrollDeltaY = 0;
  if (_edgeScrollRafId) { cancelAnimationFrame(_edgeScrollRafId); _edgeScrollRafId = null; }
  const { upg, fromBuilderNum, ghost, origBarEl, committed, hoverBuilderNum } = dragState;
  if (ghost) ghost.remove();
  clearDropPreview();
  document.body.style.userSelect = '';
  document.body.classList.remove('sim-active');
  document.querySelectorAll('.row-drop-target').forEach(el => el.classList.remove('row-drop-target'));
  if (origBarEl) origBarEl.style.opacity = '';
  dragState = null;
  if (!committed) return; // was a tap

  const targetBuilder = builderRowAt(clientX, clientY) ?? hoverBuilderNum;
  if (targetBuilder === null) return;
  const srcB = ganttData.find(b => b.builderNum === fromBuilderNum);
  const tgtB = ganttData.find(b => b.builderNum === targetBuilder);
  if (!srcB || !tgtB) return;

  const srcIdx = srcB.upgrades.indexOf(upg);
  if (srcIdx === -1) return;

  /* Same-spot detection: if dropped back at original position, no-op */
  if (targetBuilder === fromBuilderNum) {
    const beforeUid = insertBeforeUid(targetBuilder, clientX, clientY);
    const nextItem  = srcB.upgrades[srcIdx + 1];
    const isSameSpot = (beforeUid === null && !nextItem) ||
                       (nextItem && beforeUid === nextItem._uid);
    if (isSameSpot) return;
  }

  // Remove from source
  srcB.upgrades.splice(srcIdx, 1);

  // Find insertion point in target (never before the active/synthetic item)
  const tgtActiveIdx = tgtB.upgrades.findIndex(u => u._isCurrent || u._synthetic);
  const minInsert    = tgtActiveIdx === -1 ? 0 : tgtActiveIdx + 1;
  const beforeUid    = insertBeforeUid(targetBuilder, clientX, clientY);
  let insertAt       = beforeUid ? tgtB.upgrades.findIndex(u => u._uid === beforeUid) : -1;
  if (insertAt !== -1 && insertAt <= tgtActiveIdx) insertAt = minInsert;

  if (insertAt === -1 || insertAt >= tgtB.upgrades.length) {
    tgtB.upgrades.push(upg);
  } else {
    tgtB.upgrades.splice(Math.max(insertAt, minInsert), 0, upg);
  }

  restitchBuilder(srcB);
  if (targetBuilder !== fromBuilderNum) restitchBuilder(tgtB);
  computeRange();
  setSaveState(true);

  /* Tell each render's RAF to restore scroll instead of jumping to NOW */
  const _wrapEl   = document.getElementById('ganttWrap');
  const _colEl    = document.getElementById('mobileColumns');
  const _savedScrollY = window.scrollY;  /* vertical mobile uses page scroll */
  _preserveScrollDesktop = _wrapEl ? _wrapEl.scrollLeft : 0;
  _preserveScrollMobile  = _colEl  ? _colEl.scrollLeft  : 0;

  renderDesktop();
  renderMobile();

  /* Restore page scroll for vertical mobile — double-RAF ensures layout has settled
     before we scroll, so the browser doesn't undo our restore during reflow */
  if (window.innerWidth <= 768 && mobileOrientation === 'vertical') {
    requestAnimationFrame(() => requestAnimationFrame(() => window.scrollTo(0, _savedScrollY)));
  }
}

/* ── Re-stitch a single builder after drag ── */
function restitchBuilder(b) {
  const activeIdx = b.upgrades.findIndex(u => u._isCurrent);
  const anchor    = activeIdx !== -1 ? b.upgrades[activeIdx]._endDate : new Date();
  let cursor = (anchor instanceof Date && !isNaN(anchor)) ? anchor : new Date();
  const start = activeIdx !== -1 ? activeIdx + 1 : 0;
  for (let i = start; i < b.upgrades.length; i++) {
    const upg = b.upgrades[i];
    const mins = upg.durationMinutes || 0;
    upg._startDate = new Date(cursor);
    upg._endDate   = new Date(cursor.getTime() + mins * 60000);
    upg._isCurrent = false;
    cursor = upg._endDate;
  }
}

/* ── Save order to server ── */
async function saveOrder() {
  if (!hasPendingChanges) return;
  if (_hasViolations) {
    alert('⚠️ Fix all level-order violations (red bars) before saving.');
    return;
  }
  document.querySelectorAll('.save-btn').forEach(b => { b.disabled = true; b.textContent = 'Saving…'; });
  try {
    // 1. Collect upgrades that changed builder
    const transfers = [];
    ganttData.forEach(b => {
      b.upgrades.forEach(upg => {
        if (!upg._uid || upg._isCurrent || upg._synthetic) return;
        if (upg._origBuilderNum !== undefined && upg._origBuilderNum !== b.builderNum) {
          transfers.push({ upgrade: upg.upgrade, fromBuilder: `Builder_${upg._origBuilderNum}`,
            row: upg._sheetRow, toBuilder: `Builder_${b.builderNum}`, upg });
        }
      });
    });

    // 2. Group transfers by source builder (within each source, highest row first to avoid row-shift)
    //    Different source builders are independent → run in parallel
    const bySource = new Map();
    for (const t of transfers) {
      if (!bySource.has(t.fromBuilder)) bySource.set(t.fromBuilder, []);
      bySource.get(t.fromBuilder).push(t);
    }
    for (const grp of bySource.values()) grp.sort((a, b) => (b.row || 0) - (a.row || 0));

    // 3. Execute transfers: parallel across sources, sequential within each source
    await Promise.all([...bySource.values()].map(async grp => {
      for (const t of grp) {
        console.log('Transferring:', t.upgrade, 'from', t.fromBuilder, 'row', t.row, '→', t.toBuilder);
        const url = `${API_BASE}?action=transfer_upgrade&username=${encodeURIComponent(window.COC_USERNAME)}&upgrade=${encodeURIComponent(t.upgrade)}&from_builder=${encodeURIComponent(t.fromBuilder)}&row=${t.row}&to_builder=${encodeURIComponent(t.toBuilder)}`;
        const res = await fetch(url).then(r => r.json());
        if (res.status !== 'success') {
          console.error('transfer_upgrade failed:', res, t);
          throw new Error(res.error || `Transfer failed: ${t.upgrade}`);
        }
      }
    }));

    // 4. Reorder changed builders — all independent, run in parallel
    const buildersToCheck = new Set([
      ...ganttData.map(b => b.builderNum),
      ...transfers.map(t => parseInt(t.fromBuilder.match(/\d+/)?.[0]))
    ]);
    await Promise.all([...buildersToCheck].map(async builderNum => {
      const b     = ganttData.find(b => b.builderNum === builderNum);
      const origB = originalGanttData?.find(ob => ob.builderNum === builderNum);
      if (!b || !origB) return;
      const curQueue  = b.upgrades.filter(u => !u._isCurrent && !u._synthetic);
      const origQueue = origB.upgrades.filter(u => !u._isCurrent && !u._synthetic);
      const changed   = curQueue.length !== origQueue.length || curQueue.some((u, i) => u._uid !== origQueue[i]?._uid);
      if (!changed) return;

      const origStayed    = origQueue.filter(u => !transfers.some(t => t.upg._uid === u._uid && t.fromBuilder === `Builder_${builderNum}`));
      const transferredIn = transfers.filter(t => t.toBuilder === `Builder_${builderNum}`).map(t => t.upg);
      const postQueue     = [...origStayed, ...transferredIn];

      const newOrder = curQueue.map(u => postQueue.findIndex(pt => pt._uid === u._uid));

      const hasMinus1   = newOrder.some(i => i === -1);
      const lenMismatch = newOrder.length !== postQueue.length;
      const hasDupe     = new Set(newOrder).size !== newOrder.length;
      if (hasMinus1 || lenMismatch || hasDupe) {
        console.error(`Builder ${builderNum} reorder skipped — invalid order array.`, {
          newOrder, curQueueNames: curQueue.map(u => u.upgrade), postQueueNames: postQueue.map(u => u.upgrade),
          curLen: curQueue.length, postLen: postQueue.length, hasMinus1, lenMismatch, hasDupe
        });
        return;
      }
      if (newOrder.every((v, i) => v === i)) return;

      console.log(`Reordering Builder ${builderNum}:`, newOrder, '→', postQueue.map(u=>u.upgrade));
      const url = `${API_BASE}?action=reorder_builder_upgrades&username=${encodeURIComponent(window.COC_USERNAME)}&builder=Builder_${builderNum}&order=${newOrder.join(',')}`;
      const res = await fetch(url).then(r => r.json());
      if (res.status !== 'success') {
        console.error('reorder_builder_upgrades failed:', res, { builderNum, newOrder });
        throw new Error(res.error || `Reorder failed for Builder ${builderNum}`);
      }
    }));

    // 5. Done — refresh with fresh data
    setSaveState(false);
    if (dragModeEnabled) toggleDragMode();
    await loadGantt();
  } catch (err) {
    console.error('Save failed:', err);
    alert('Save failed: ' + err.message);
    document.querySelectorAll('.save-btn').forEach(b => {
      b.disabled = false;
      b.classList.add('has-changes');
      b.textContent = b.id === 'saveBtnMobile' ? '💾 Save' : '💾 Save Order';
    });
  }
}

/* ── Global drag listeners (init once) ── */
function _dragTouchMove(e) {
  if (!dragState) return;
  onDragMove(e.touches[0].clientX, e.touches[0].clientY);
  if (dragState.committed) e.preventDefault();
}
(function() {
  document.addEventListener('mousemove', e => { if (dragState) onDragMove(e.clientX, e.clientY); });
  document.addEventListener('mouseup',   e => { if (dragState) onDragEnd(e.clientX, e.clientY); });
  /* _dragTouchMove is registered/removed as non-passive only when drag mode is on (see toggleDragMode).
     Keeping it passive by default lets the browser scroll natively without waiting for JS. */
  document.addEventListener('touchend', e => {
    if (dragState) onDragEnd(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
  });
})();

/* ── Toggle drag mode ── */
function toggleDragMode() {
  dragModeEnabled = !dragModeEnabled;
  /* Only block native scroll (non-passive) while drag mode is active */
  if (dragModeEnabled) {
    document.addEventListener('touchmove', _dragTouchMove, { passive: false });
  } else {
    document.removeEventListener('touchmove', _dragTouchMove);
  }
  const zoomBar = document.getElementById('zoomBar');
  if (zoomBar) zoomBar.classList.toggle('drag-mode-active', dragModeEnabled);
  const mobileBar = document.querySelector('.mobile-zoom-bar');
  if (mobileBar) mobileBar.classList.toggle('drag-mode-active', dragModeEnabled);
  /* body class drives touch-action:none CSS on draggable bars when drag mode is on */
  document.body.classList.toggle('drag-mode-active', dragModeEnabled);
  document.querySelectorAll('.drag-mode-btn').forEach(btn => {
    btn.classList.toggle('active', dragModeEnabled);
    btn.title = dragModeEnabled ? 'Click to exit drag mode' : 'Click to enable drag mode';
  });
  /* When drag mode is off, cancel any in-progress drag */
  if (!dragModeEnabled && dragState) {
    _edgeScrollDeltaY = 0;
    if (_edgeScrollRafId) { cancelAnimationFrame(_edgeScrollRafId); _edgeScrollRafId = null; }
    if (dragState.ghost) dragState.ghost.remove();
    if (dragState.origBarEl) dragState.origBarEl.style.opacity = '';
    document.querySelectorAll('.row-drop-target').forEach(el => el.classList.remove('row-drop-target'));
    document.body.style.userSelect = '';
    clearDropPreview();
    document.body.classList.remove('sim-active');
    dragState = null;
  }
}

/* ── Cancel / discard changes ── */
function cancelChanges() {
  if (!hasPendingChanges) return;
  if (!confirm('Discard all unsaved reorder changes?')) return;
  if (originalGanttData) {
    ganttData = originalGanttData.map(b => ({ builderNum: b.builderNum, upgrades: b.upgrades.map(u => ({ ...u })) }));
  }
  computeRange();
  setSaveState(false);
  if (dragModeEnabled) toggleDragMode();
  renderDesktop();
  renderMobile();
}

/* ── Update cancel button state alongside save button ── */
const _origSetSaveState = setSaveState;
setSaveState = function(dirty) {
  _origSetSaveState(dirty);
  document.querySelectorAll('.cancel-btn').forEach(btn => btn.classList.toggle('has-changes', dirty));
};

/* ── Scroll arrow helpers (used in drag mode) ── */
let _scrollInterval = null;
function startScroll(containerId, dir) {
  stopScroll();
  const el = document.getElementById(containerId);
  if (!el) return;
  const step = dir * 120;
  _scrollInterval = setInterval(() => { el.scrollLeft += step; }, 60);
}
function stopScroll() {
  clearInterval(_scrollInterval);
  _scrollInterval = null;
}

/* ── TOGGLE BUILDERS ── */
function toggleBuilder(n) {
  const btn = document.querySelector(`.toggle-btn[data-b="${n}"]`);
  if (activeBuilders.has(n)) { activeBuilders.delete(n); btn.classList.remove('active'); }
  else                        { activeBuilders.add(n);   btn.classList.add('active'); }
  renderDesktop();
  if (mobileOrientation === 'horizontal') {
    renderMobileHorizontal(); /* full re-render to close row gaps */
  } else {
    const mc = document.querySelector(`.mobile-builder-col[data-builder="${n}"]`);
    if (mc) mc.classList.toggle('hidden-col', !activeBuilders.has(n));
    /* Also show/hide the corresponding cell in the external sticky header row */
    const vhCell = document.querySelector(`#mobileVHeadersInner [data-vh-builder="${n}"]`);
    if (vhCell) vhCell.style.display = activeBuilders.has(n) ? 'flex' : 'none';
    /* Re-sync vHeaders scroll position after layout change */
    const vhEl = document.getElementById('mobileVHeaders');
    const colEl = document.getElementById('mobileColumns');
    if (vhEl && colEl) vhEl.scrollLeft = colEl.scrollLeft;
  }
}

/* ════════════════════════════════════════════
   GANTT SEARCH
════════════════════════════════════════════ */
let _ganttSearchTimer = null;

function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escapeAttr(s) { return (s||'').replace(/"/g,'&quot;'); }

function openGanttSearch() {
  document.getElementById('ganttSearchModal').style.display = 'flex';
  setTimeout(() => document.getElementById('ganttSearchInput')?.focus(), 50);
}

function closeGanttSearch() {
  document.getElementById('ganttSearchModal').style.display = 'none';
  const inp = document.getElementById('ganttSearchInput');
  const res = document.getElementById('ganttSearchResults');
  if (inp) inp.value = '';
  if (res) res.innerHTML = '<div class="search-hint">Start typing to search upgrades in the chart</div>';
}

function runGanttSearch(query) {
  const res = document.getElementById('ganttSearchResults');
  if (!res) return;
  const q = (query || '').trim().toLowerCase();
  if (q.length < 2) {
    res.innerHTML = '<div class="search-hint">Type at least 2 characters to search</div>';
    return;
  }
  if (!ganttData || ganttData.length === 0) {
    res.innerHTML = '<div class="search-hint">Chart not loaded yet — hit Refresh first</div>';
    return;
  }

  const matches = [];
  for (const b of ganttData) {
    for (const upg of b.upgrades) {
      if (!upg.upgrade) continue;
      if (upg.upgrade.toLowerCase().includes(q)) {
        matches.push({ builderNum: b.builderNum, upg });
      }
    }
  }

  if (matches.length === 0) {
    res.innerHTML = `<div class="search-no-results">No upgrades found for "<strong style="color:#ccc">${escapeHtml(query)}</strong>"</div>`;
    return;
  }

  res.innerHTML = matches.map(({ builderNum, upg }) => {
    const isSC    = upg.upgrade.includes('*');
    const imgSrc  = isSC ? getSuperchargeImage(upg.upgrade) : getUpgradeImage(upg.upgrade);
    const nameHtml = isSC
      ? `<span style="color:#093DBA">${formatUpgradeName(escapeHtml(upg.upgrade))}</span>`
      : escapeHtml(upg.upgrade);
    const startStr = upg._startDate ? fmtDate(upg._startDate) : (upg.start || '—');
    const endStr   = upg._endDate   ? fmtDate(upg._endDate)   : (upg.end   || '—');
    return `
    <div class="search-result-item">
      <div class="search-result-main">
        <img src="${imgSrc}" class="search-result-icon" onerror="this.src='Images/Upgrades/PH.png'" alt="" />
        <div class="search-result-info">
          <div class="search-result-name">${nameHtml}</div>
          <div class="search-result-meta">
            <span class="search-builder-tag">Builder ${builderNum}</span>
            ${upg.duration ? `<span class="search-duration">${escapeHtml(upg.duration)}</span>` : ''}
          </div>
          <div class="search-result-dates">${startStr} → ${endStr}</div>
        </div>
      </div>
      <div class="search-result-footer">
        <button class="search-jump-btn"
                data-uid="${escapeAttr(upg._uid)}"
                data-builder="${builderNum}">
          Jump to ↗
        </button>
      </div>
    </div>`;
  }).join('');
}

function jumpToGanttBar(uid, builderNum) {
  closeGanttSearch();

  /* Make builder visible if it was toggled off */
  const bn = parseInt(builderNum);
  if (!activeBuilders.has(bn)) {
    activeBuilders.add(bn);
    const btn = document.querySelector(`.toggle-btn[data-b="${bn}"]`);
    if (btn) btn.classList.add('active');
    renderDesktop();
  }

  requestAnimationFrame(() => {
    const wrap = document.getElementById('ganttWrap');
    const bar  = document.querySelector(`.gantt-bar[data-upg-uid="${uid}"]`);

    if (bar && wrap) {
      const barRect  = bar.getBoundingClientRect();
      const wrapRect = wrap.getBoundingClientRect();
      const targetScroll = wrap.scrollLeft + (barRect.left - wrapRect.left) - wrap.clientWidth / 3;
      wrap.scrollLeft = Math.max(targetScroll, _minScrollDesktop);
      bar.classList.add('search-highlight');
      setTimeout(() => bar.classList.remove('search-highlight'), 3000);
    } else if (wrap && todayStart) {
      /* Fallback: compute position from start date */
      const PX = Math.max(Math.round(140 * ganttZoom), 20);
      const LW = 130;
      for (const b of ganttData) {
        if (b.builderNum !== bn) continue;
        const upg = b.upgrades.find(u => u._uid === uid);
        if (!upg?._startDate) break;
        const leftPx = daysBetween(todayStart, upg._startDate) * PX;
        wrap.scrollLeft = Math.max(LW + leftPx - wrap.clientWidth / 3, _minScrollDesktop);
        break;
      }
    }
  });
}

/* Wire up search after DOM is ready */
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('ganttSearchBtn')?.addEventListener('click', openGanttSearch);
  document.getElementById('ganttSearchClose')?.addEventListener('click', closeGanttSearch);

  document.getElementById('ganttSearchModal')?.addEventListener('click', e => {
    if (e.target === document.getElementById('ganttSearchModal')) closeGanttSearch();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && document.getElementById('ganttSearchModal')?.style.display !== 'none') closeGanttSearch();
  });

  document.getElementById('ganttSearchInput')?.addEventListener('input', e => {
    clearTimeout(_ganttSearchTimer);
    _ganttSearchTimer = setTimeout(() => runGanttSearch(e.target.value), 200);
  });

  document.getElementById('ganttSearchResults')?.addEventListener('click', e => {
    const btn = e.target.closest('.search-jump-btn');
    if (!btn) return;
    jumpToGanttBar(btn.dataset.uid, btn.dataset.builder);
  });

  setupPullToRefresh(loadGantt);
});

function setupPullToRefresh(onRefresh) {
  const THRESHOLD = 80;
  let startY = 0, dist = 0, active = false;
  const bar = document.createElement('div');
  bar.className = 'ptr-bar';
  document.body.prepend(bar);
  function onStart(y) { if (window.scrollY !== 0) return; startY = y; dist = 0; active = true; }
  function onMove(y)  { if (!active) return; dist = Math.max(0, y - startY); bar.style.setProperty('--ptr-p', Math.min(dist / THRESHOLD, 1)); bar.classList.toggle('ptr-ready', dist >= THRESHOLD); }
  async function onEnd() {
    if (!active) return; active = false;
    if (dist < THRESHOLD) { bar.style.setProperty('--ptr-p', 0); bar.classList.remove('ptr-ready'); return; }
    bar.classList.remove('ptr-ready'); bar.classList.add('ptr-loading');
    await onRefresh();
    bar.classList.remove('ptr-loading'); bar.style.setProperty('--ptr-p', 0); dist = 0;
  }
  document.addEventListener('touchstart', e => onStart(e.touches[0].clientY), { passive: true });
  document.addEventListener('touchmove',  e => onMove(e.touches[0].clientY),  { passive: true });
  document.addEventListener('touchend',   onEnd);
  document.addEventListener('mousedown', e => onStart(e.clientY));
  document.addEventListener('mousemove', e => { if (active) onMove(e.clientY); });
  document.addEventListener('mouseup',   onEnd);
}
</script>
