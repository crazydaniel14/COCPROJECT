<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>COC Planner — Schedule</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:     #f5d04c;
      --bg:       #101013;
      --surface:  #19191e;
      --surface2: #23232b;
      --border:   rgba(255,255,255,0.08);
      --text:     #ffffff;
      --text-dim: #9999a8;
      /* Bright, harmonious palette — coral, sky, mint, amber, lavender, teal */
      --b1: #A9B7A9;
      --b2: #B18EA9;
      --b3: #508B8B;
      --b4: #CC7A6F;
      --b5: #A899E6;
      --b6: #C5A86E;
    }

    html, body { height:100%; background:var(--bg); font-family:'Lexend',sans-serif; color:var(--text); overflow-x:hidden; }

    /* ── HEADER ── */
    .gantt-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 20px; background:var(--surface);
      border-bottom:1px solid var(--border);
      position:sticky; top:0; z-index:200; gap:12px;
    }
    .gantt-title { font-size:18px; font-weight:800; color:var(--gold); letter-spacing:.5px; white-space:nowrap; }
    .back-btn {
      display:flex; align-items:center; gap:6px;
      background:var(--surface2); border:1px solid var(--border); border-radius:10px;
      padding:8px 14px; color:var(--text-dim); font-family:'Lexend',sans-serif;
      font-size:13px; font-weight:600; cursor:pointer; transition:all .18s; white-space:nowrap;
    }
    .back-btn:hover { color:var(--text); border-color:var(--gold); }
    .refresh-btn {
      display:flex; align-items:center; gap:6px;
      background:var(--gold); border:none; border-radius:10px;
      padding:8px 14px; color:#000; font-family:'Lexend',sans-serif;
      font-size:13px; font-weight:700; cursor:pointer; transition:all .18s; white-space:nowrap;
    }
    .refresh-btn:hover { background:#ffd700; }
    .refresh-btn.loading { opacity:.7; pointer-events:none; }

    /* ── TOGGLES ── */
    .builder-toggles {
      display:flex; gap:8px; padding:10px 20px;
      background:var(--surface); border-bottom:1px solid var(--border);
      overflow-x:auto; position:sticky; top:57px; z-index:190;
      justify-content:center;
    }
    .builder-toggles::-webkit-scrollbar { display:none; }
    .toggle-btn {
      display:flex; align-items:center; gap:7px; padding:7px 14px;
      border-radius:10px; border:1.5px solid var(--border);
      font-family:'Lexend',sans-serif; font-size:12px; font-weight:700;
      cursor:pointer; transition:all .2s; white-space:nowrap;
      background:var(--surface2); color:var(--text-dim); opacity:0.5;
    }
    .toggle-btn.active { opacity:1; color:#fff; }
    .toggle-btn img { width:20px; height:20px; object-fit:contain; border-radius:4px; }
    .toggle-btn[data-b="1"].active { background:rgba(255,107,107,.2); border-color:rgba(255,107,107,.6); color:#A9B7A9; }
    .toggle-btn[data-b="2"].active { background:rgba(69,183,209,.2);  border-color:rgba(69,183,209,.6);  color:#B18EA9; }
    .toggle-btn[data-b="3"].active { background:rgba(81,207,102,.2);  border-color:rgba(81,207,102,.6);  color:#508B8B; }
    .toggle-btn[data-b="4"].active { background:rgba(255,212,59,.2);  border-color:rgba(255,212,59,.6);  color:#CC7A6F; }
    .toggle-btn[data-b="5"].active { background:rgba(204,93,232,.2);  border-color:rgba(204,93,232,.6);  color:#A899E6; }
    .toggle-btn[data-b="6"].active { background:rgba(32,201,151,.2);  border-color:rgba(32,201,151,.6);  color:#C5A86E; }

    /* ── ZOOM BAR (desktop only) ── */
    .zoom-bar {
      display:flex; align-items:center; gap:10px; padding:8px 20px;
      background:var(--surface); border-top:1px solid var(--border);
      position:sticky; bottom:0; z-index:190;
    }
    .zoom-label { font-size:11px; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:.5px; }
    .zoom-btn {
      width:32px; height:32px; border-radius:8px;
      border:1.5px solid var(--border); background:var(--surface2);
      color:var(--text); font-size:18px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:all .15s;
    }
    .zoom-btn:hover { border-color:var(--gold); color:var(--gold); }
    .zoom-level { font-size:12px; font-weight:800; color:var(--gold); min-width:40px; text-align:center; }
    .now-btn {
      height:32px; padding:0 12px; border-radius:8px;
      border:1.5px solid rgba(245,208,76,0.55); background:rgba(245,208,76,0.12);
      color:var(--gold); font-family:'Lexend',sans-serif;
      font-size:11px; font-weight:800; cursor:pointer;
      transition:all .15s; white-space:nowrap; letter-spacing:.3px;
    }
    .now-btn:hover { background:rgba(245,208,76,0.25); border-color:var(--gold); }

    /* ── LOADING ── */
    .state-msg {
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; gap:16px; height:300px; color:var(--text-dim); font-size:15px;
    }
    .spinner { width:36px; height:36px; border:3px solid var(--surface2); border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── DESKTOP GANTT ── */
    .gantt-wrap { overflow-x:auto; overflow-y:visible; }

    /* clip-path clips content to bar bounds without creating a scroll container,
       so position:sticky on .bar-inner still references .gantt-wrap correctly */
    .gantt-bar {
      position:absolute; border-radius:8px;
      display:flex; align-items:center; padding:0;
      cursor:pointer; overflow:visible;
      clip-path: inset(0 round 8px);
      transition:filter .15s, box-shadow .15s;
      border:2.5px solid rgba(255,255,255,0.45);
      box-shadow:inset 0 -3px 0 rgba(0,0,0,0.3);
    }
    /* outline is not clipped by clip-path, so hover ring shows outside bar */
    .gantt-bar:hover { filter:brightness(1.15); outline:2px solid rgba(255,255,255,0.7); outline-offset:1px; box-shadow:inset 0 -3px 0 rgba(0,0,0,0.3); z-index:5; }

    /* Sticky inner: left is set dynamically = label-col-width, so it hugs that edge */
    .bar-inner {
      display:flex; align-items:center; gap:0;
      overflow:visible; pointer-events:none;
      position:sticky;
    }
    .bar-icon { object-fit:contain; border-radius:5px; flex-shrink:0; background:transparent; padding:2px; overflow:hidden; }

    .bar-text-col { display:flex; flex-direction:column; gap:1px; overflow:hidden; padding:0 5px; flex:1; min-width:0; }
    .bar-name     { font-size:11px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:#fff; text-shadow:0 1px 3px rgba(0,0,0,0.8); line-height:1.25; }
    .bar-dur      { font-size:9px;  font-weight:600; color:rgba(255,255,255,0.75); text-shadow:0 1px 2px rgba(0,0,0,0.7); white-space:nowrap; line-height:1.25; }
    .bar-finish-lbl { font-size:8.5px; font-weight:700; color:rgba(255,255,255,0.82); text-shadow:0 1px 2px rgba(0,0,0,0.9); white-space:nowrap; line-height:1.25; }

    /* End-time badge pinned to the right end of the bar */
    .bar-end-badge {
  position:absolute; right:4px; top:50%; transform:translateY(-50%);
  font-size:8px; font-weight:800; color:#fff;
  background:rgba(0,0,0,0.45); border-radius:4px;
  padding:2px 5px; pointer-events:none;
  text-align:right; line-height:1.45;
   }
    .gantt-boost-marker {
      position:absolute; top:2px; width:14px; height:14px; background:#fff;
      border-radius:50%; display:flex; align-items:center; justify-content:center;
      font-size:8px; z-index:3; pointer-events:none; box-shadow:0 1px 4px rgba(0,0,0,.4);
    }
    .bar-active-badge {
      position:absolute; top:0; left:8px;
      background:rgba(255,255,255,0.92); color:#000;
      font-size:7px; font-weight:800; padding:1px 5px;
      border-radius:0 0 4px 4px; white-space:nowrap; pointer-events:none;
      letter-spacing:.4px; line-height:1.4;
    }

    /* ── TOOLTIP ── */
    .gantt-tooltip {
      position:fixed; background:linear-gradient(135deg,#2a2a2f,#1e1e24);
      border:1.5px solid rgba(245,208,76,.3); border-radius:14px;
      padding:14px 18px; z-index:9999; pointer-events:none;
      max-width:295px; box-shadow:0 12px 40px rgba(0,0,0,.7); display:none;
    }
    .gantt-tooltip.visible { display:block; }
    .tt-name  { font-size:13px; font-weight:800; color:var(--text); margin-bottom:8px; }
    .tt-row   { display:flex; justify-content:space-between; gap:16px; margin-bottom:4px; }
    .tt-label { font-size:10px; color:var(--text-dim); font-weight:700; text-transform:uppercase; letter-spacing:.5px; }
    .tt-value { font-size:11px; color:var(--text); font-weight:600; text-align:right; }
    .tt-boost     { margin-top:8px; padding-top:8px; border-top:1px solid var(--border); font-size:11px; color:var(--gold); font-weight:700; }
    .tt-boost-row { font-size:10px; color:#ccc; margin-top:3px; }

    /* ── RESPONSIVE ── */
    @media (max-width:768px) {
      .gantt-wrap { display:none !important; }
      .zoom-bar   { display:none !important; }
      .gantt-mobile { display:block; }
      .gantt-header { padding:12px 14px; }
      .gantt-title  { font-size:15px; }
      .back-btn, .refresh-btn { padding:7px 11px; font-size:12px; }
      .builder-toggles { padding:8px 14px; top:51px; justify-content:flex-start; }
.toggle-btn { padding:6px 10px; font-size:11px; }
  }

  /* Mobile zoom bar — 2-row layout */
  .mobile-zoom-bar {
    display:flex; flex-direction:column; gap:5px;
    padding:7px 12px; background:var(--surface);
    border-bottom:1px solid var(--border);
    position:sticky; top:101px; z-index:185;
  }
  .mzb-row { display:flex; align-items:center; gap:5px; width:100%; }
  .mzb-sep { width:1px; height:22px; background:rgba(255,255,255,0.12); flex-shrink:0; }
  .mobile-zoom-bar .zoom-btn { width:30px; height:30px; font-size:16px; }
  .zoom-btn.mzb-jump { width:auto !important; padding:0 7px !important; font-size:10px !important; font-weight:700 !important; }
  .mobile-zoom-bar .zoom-label { font-size:10px; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:.4px; }
  .mobile-zoom-bar .zoom-level { font-size:12px; font-weight:800; color:var(--gold); min-width:36px; text-align:center; }
  .orient-btn {
    display:flex; align-items:center; gap:4px;
    background:var(--surface2); border:1.5px solid var(--border); border-radius:8px;
    padding:5px 8px; color:var(--text-dim); font-family:'Lexend',sans-serif;
    font-size:10px; font-weight:700; cursor:pointer; transition:all .18s; white-space:nowrap;
  }
  .orient-btn.active { border-color:var(--gold); color:var(--gold); }
    @media (min-width:769px) { .gantt-mobile { display:none; } }

    /* ── MOBILE GANTT ── */
    .gantt-mobile { padding-bottom:60px; }
    .mobile-columns-wrapper { display:flex; overflow-x:auto; overscroll-behavior-x:contain; -webkit-overflow-scrolling:touch; }
    .mobile-columns-wrapper::-webkit-scrollbar { display:none; }

    .mobile-time-axis { flex-shrink:0; width:58px; background:var(--bg); z-index:10; touch-action:pan-y; }
    .mobile-time-header {
      height:84px; border-bottom:1px solid var(--border); border-right:1px solid var(--border);
      display:flex; align-items:flex-end; padding:0 5px 8px;
      font-size:9px; font-weight:700; color:var(--text-dim); text-transform:uppercase;
    }
    .mobile-time-tick {
      border-right:1px solid var(--border); border-bottom:1px solid var(--border);
      display:flex; align-items:flex-start; padding:4px 3px 0;
      font-size:9px; font-weight:700; color:var(--text-dim); white-space:nowrap;
    }
    .mobile-time-tick.today-row { color:var(--gold); border-bottom-color:rgba(245,208,76,.5); }

    /* Columns are 120px — flex so hiding one closes the gap automatically */
    .mobile-builder-col { flex-shrink:0; width:120px; border-right:1px solid var(--border); }
    .mobile-builder-col.hidden-col { display:none; }
    .mobile-col-header {
      height:84px; border-bottom:3px solid;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; padding:6px 4px;
    }
    /* Sticky header row that lives OUTSIDE mobileColumns (avoids overflow-x:auto blocking sticky) */
    #mobileVHeaders {
      display:none; background:var(--bg);
      border-bottom:2px solid var(--border); height:84px; flex-shrink:0;
      position:sticky; z-index:20;
      overflow-x:auto; overflow-y:hidden;
      scrollbar-width:none; -ms-overflow-style:none;
    }
    #mobileVHeaders::-webkit-scrollbar { display:none; }
    .mobile-col-header img { width:32px; height:32px; object-fit:contain; }
    .mobile-col-header span { font-size:11px; font-weight:700; white-space:nowrap; }
    .mobile-col-body { position:relative; }

    /* clip-path clips content without creating scroll container — preserves sticky */
    .mobile-bar {
      position:absolute; left:4px; right:4px; border-radius:8px;
      border:2px solid rgba(255,255,255,0.3); cursor:pointer; min-height:8px;
      overflow:visible; clip-path: inset(0 round 8px); transition:filter .12s;
    }
    .mobile-bar:active { filter:brightness(1.2); }

    /* Label always at top of bar — absolute so icon never drifts to bar bottom */
    .mobile-bar-label {
      position:absolute; top:4px; left:0; right:0;
      padding:0 5px;
      display:flex; flex-direction:column; align-items:center; gap:4px;
      pointer-events:none; z-index:3;
    }
    .mobile-bar-icon {
  width:44px; height:44px; object-fit:contain; border-radius:7px;
  background:transparent; padding:3px; flex-shrink:0;
  filter:drop-shadow(0 2px 6px rgba(0,0,0,.7));
    }
    .mobile-bar-text-block {
      display:flex; flex-direction:column; align-items:center; gap:2px; width:100%;
    }
    .mobile-bar-name {
      font-size:9px; font-weight:800; color:#fff;
      text-shadow:0 1px 3px rgba(0,0,0,0.9);
      line-height:1.25; word-break:break-word; text-align:center;
    }
    .mobile-bar-dur {
      font-size:8px; font-weight:700; color:rgba(255,255,255,0.82);
      text-shadow:0 1px 2px rgba(0,0,0,0.8); white-space:nowrap;
    }

    /* Finish time: large, bold, dark backdrop — easy to read (FIX #4) */
    .mobile-bar-end {
      position:absolute; bottom:4px; left:3px; right:3px; text-align:center;
      font-size:9.5px; font-weight:800; color:#fff;
      text-shadow:0 1px 3px rgba(0,0,0,0.95);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      pointer-events:none;
      background:rgba(0,0,0,0.4); border-radius:4px; padding:2px 3px;
    }

    .mobile-boost-dot {
      position:absolute; width:14px; height:14px; background:#fff; border-radius:50%;
      right:3px; display:flex; align-items:center; justify-content:center;
      font-size:8px; box-shadow:0 1px 4px rgba(0,0,0,.5); pointer-events:none;
    }

    /* Prevent browser scroll/zoom on draggable bars when drag mode is active */
    body.drag-mode-active .mobile-bar[data-draggable="1"] { touch-action: none; }

    /* ── DRAG & DROP ── */
    .save-btn {
      display:flex; align-items:center; gap:5px;
      border-radius:8px; border:1.5px solid var(--border);
      background:var(--surface2); color:var(--text-dim);
      font-family:'Lexend',sans-serif; font-size:12px; font-weight:700;
      padding:6px 14px; cursor:not-allowed; transition:all .18s; white-space:nowrap;
      opacity:0.4;
    }
    .save-btn.has-changes {
      background:rgba(245,160,40,.18); border-color:rgba(245,160,40,.7);
      color:var(--gold); cursor:pointer; opacity:1;
    }
    .save-btn.has-changes:hover { background:rgba(245,160,40,.3); }
    .drag-ghost {
      position:fixed; z-index:9999; pointer-events:none;
      border-radius:8px; opacity:0.88; font-family:'Lexend',sans-serif;
      font-size:11px; font-weight:700; color:#000;
      display:flex; align-items:center; gap:7px; padding:4px 10px;
      box-shadow:0 6px 28px rgba(0,0,0,.7); user-select:none;
    }
    .drag-ghost img { object-fit:contain; flex-shrink:0; border-radius:4px; }
    .drag-ghost span { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    /* Drop preview bar — shown in target row during drag */
    .drop-preview {
      position:absolute; border-radius:8px; pointer-events:none; z-index:10;
      animation:previewPulse 1s ease-in-out infinite alternate;
    }
    @keyframes previewPulse { from { opacity:0.5; } to { opacity:0.85; } }
    /* Smooth bar-shift animation while dragging (applied via JS) */
    .sim-active .gantt-bar { transition: left 0.14s ease, width 0.14s ease, filter .15s, box-shadow .15s !important; }
    .sim-active .mobile-bar { transition: top 0.14s ease, height 0.14s ease, filter .12s !important; }
    .row-drop-target { outline:2px solid var(--gold) !important; outline-offset:-2px; }
    .drag-mode-btn {
      display:flex; align-items:center; gap:5px;
      border-radius:8px; border:1.5px solid var(--border);
      background:var(--surface2); color:var(--text-dim);
      font-family:'Lexend',sans-serif; font-size:11px; font-weight:700;
      padding:6px 12px; cursor:pointer; transition:all .18s; white-space:nowrap;
    }
    .drag-mode-btn.active { background:rgba(204,93,232,.2); border-color:rgba(204,93,232,.6); color:#CC5DE8; }
    .drag-mode-btn:hover  { border-color:var(--gold); }
    .scroll-arrow-btn {
      display:flex; width:30px; height:30px; border-radius:8px;
      border:1.5px solid var(--border); background:var(--surface2);
      color:var(--text); font-size:16px; cursor:pointer;
      align-items:center; justify-content:center; transition:all .15s; user-select:none;
    }
    .scroll-arrow-btn:hover { border-color:var(--gold); color:var(--gold); }
    .cancel-btn {
      width:30px; height:30px; border-radius:8px;
      border:1.5px solid var(--border); background:var(--surface2);
      color:var(--text-dim); font-size:15px; cursor:not-allowed;
      align-items:center; justify-content:center; opacity:0.35; transition:all .18s; display:flex;
    }
    .cancel-btn.has-changes { border-color:rgba(255,100,100,.6); color:#FF6B6B; cursor:pointer; opacity:1; }
    .cancel-btn.has-changes:hover { background:rgba(255,100,100,.15); }

    /* ── VIOLATION STYLES ── */
    @keyframes violPulse { from{filter:brightness(1)} to{filter:brightness(1.35)} }
    .gantt-bar.violation-bar, .mobile-bar.violation-bar {
      background:#c0392b !important; border-color:rgba(255,120,120,0.9) !important;
      animation:violPulse 0.8s ease-in-out infinite alternate;
    }
    .gantt-bar.blocker-bar, .mobile-bar.blocker-bar {
      border:3px solid #ff4444 !important;
    }
    .save-btn.has-violations {
      background:rgba(255,70,70,0.18) !important; border-color:rgba(255,70,70,0.7) !important;
      color:#ff6b6b !important; cursor:not-allowed !important; opacity:1;
    }
    .save-btn.has-violations:hover { background:rgba(255,70,70,0.28) !important; }

    /* Bottom sheet */
    .mobile-sheet {
      position:fixed; bottom:0; left:0; right:0; z-index:9999;
      background:linear-gradient(160deg,#2a2a2f,#1e1e24);
      border:1.5px solid rgba(245,208,76,.3); border-bottom:none;
      border-radius:20px 20px 0 0; padding:20px 20px 36px;
      box-shadow:0 -8px 40px rgba(0,0,0,.7); animation:slideUp .2s ease;
    }
    @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
    .sheet-handle { width:36px; height:4px; background:rgba(255,255,255,.2); border-radius:2px; margin:0 auto 16px; }
    .sheet-title  { font-size:15px; font-weight:800; color:#fff; margin-bottom:12px; }
    .sheet-row    { display:flex; justify-content:space-between; margin-bottom:8px; }
    .sheet-label  { font-size:10px; color:var(--text-dim); font-weight:700; text-transform:uppercase; }
    .sheet-value  { font-size:12px; color:#fff; font-weight:600; }
    .sheet-boost  { margin-top:10px; padding-top:10px; border-top:1px solid rgba(255,255,255,.08); font-size:11px; color:var(--gold); font-weight:700; }

    /* ── GANTT SEARCH ── */
    .gantt-search-btn {
      display:flex; align-items:center; justify-content:center;
      background:var(--surface2); border:1px solid var(--border); border-radius:10px;
      padding:8px 12px; color:var(--text-dim); cursor:pointer;
      transition:all .18s; white-space:nowrap;
    }
    .gantt-search-btn:hover { color:var(--gold); border-color:var(--gold); }

    .search-modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.85);
      display:flex; align-items:flex-start; justify-content:center;
      z-index:10000; backdrop-filter:blur(4px); padding-top:60px;
    }
    .search-modal-content {
      background:linear-gradient(135deg,#2a2a2f 0%,#1f1f24 100%);
      border:2px solid rgba(245,208,76,0.3); border-radius:20px; padding:24px;
      width:90%; max-width:520px; max-height:78vh;

    @keyframes ganttSearchHighlight {
      0%   { outline:4px solid #fff; outline-offset:3px; filter:brightness(2.0) saturate(0.4); }
      20%  { outline:4px solid transparent; outline-offset:1px; filter:brightness(0.75); }

  </style>
</head>

<script>
/* ── HELPERS ── */
function formatUpgradeName(name) {
  if (!name) return '';
  return name.replace(/\*/g, '<img src="Images/SCicon.png" style="height:1em;vertical-align:middle;margin:0 1px;" alt="SC">');
}

function getSuperchargeImage(upgradeName) {
  const basePath = "Images/Upgrades/";
  const baseMatch = upgradeName.match(/^(.+?)\s*(?:#\d+)?\s+Lvl\s+\*+$/i);
  if (!baseMatch) return basePath + "PH.png";
  const baseName = baseMatch[1].trim();
  if (!IMAGE_MAP[baseName]) return basePath + "PH.png";
  const entries = IMAGE_MAP[baseName];
  return basePath + baseName + " " + entries[entries.length - 1] + ".png";
}

/* ── CONFIG ── */
const API_BASE = "https://script.google.com/macros/s/AKfycbzaxmuwpTD9cUzrz4e4k75caCpQrTjEDefs-B5nuEaqlFoMrBHjrhDun3Iy7kPkc9j2/exec";

/* Bright, harmonious palette */
const BUILDER_COLORS = {
  1: '#A9B7A9',   /* coral red   */
  2: '#B18EA9',   /* sky blue    */
  3: '#508B8B',   /* mint green  */
  4: '#CC7A6F',   /* amber       */

};

const HERO_NAMES = ["Archer Queen","Barbarian King","Dragon Duke","Grand Warden","Minion Prince","Royal Champion","Longshot","Smasher","Air Bombs"];
const IMAGE_MAP = {
  "Air Bomb":          ["Lvl 11&12","Lvl 13"],
  "Air Defense":       ["Lvl 1","Lvl 2","Lvl 3","Lvl 4","Lvl 5","Lvl 6","Lvl 7","Lvl 8","Lvl 9","Lvl 10","Lvl 11","Lvl 12","Lvl 13","Lvl 14","Lvl 15","Lvl 16"],
  "Air Sweeper":       ["Lvl 1","Lvl 2","Lvl 3","Lvl 4","Lvl 5","Lvl 6","Lvl 7"],
  "Archer Tower":      ["Lvl 1","Lvl 2","Lvl 3","Lvl 4","Lvl 5","Lvl 6","Lvl 7","Lvl 8","Lvl 9","Lvl 10","Lvl 11","Lvl 12","Lvl 13","Lvl 14","Lvl 15","Lvl 16","Lvl 17","Lvl 18","Lvl 19","Lvl 20","Lvl 21"],
  "Blacksmith":        ["Lvl 9"],
  "Bomb":              ["Lvl 11&12","Lvl 13&14"],
  "Bomb Tower":        ["Lvl 1","Lvl 2","Lvl 3","Lvl 4","Lvl 5","Lvl 6","Lvl 7","Lvl 8","Lvl 9","Lvl 10","Lvl 11","Lvl 12","Lvl 13"],
  "Builder Hut":       ["Lvl 2","Lvl 3","Lvl 4","Lvl 5","Lvl 6","Lvl 7&8&9"],
  "Cannon":            ["Lvl 1","Lvl 2","Lvl 3","Lvl 4","Lvl 5","Lvl 6","Lvl 7","Lvl 8","Lvl 9","Lvl 10","Lvl 11","Lvl 12","Lvl 13","Lvl 14","Lvl 15","Lvl 16","Lvl 17","Lvl 18","Lvl 19","Lvl 20","Lvl 21"],
  "Clan Castle":       ["Lvl 14"],
  "Dark Elixir Drill": ["Lvl 10","Lvl 11"],
  "Dark Elixir Storage":["Lvl 12","Lvl 13"],
  "Eagle Artillery":   ["Lvl 1","Lvl 2","Lvl 3","Lvl 4","Lvl 5","Lvl 6","Lvl 7"],
  "Elixir Collector":  ["Lvl 17"],
  "Elixir Storage":    ["Lvl 18","Lvl 19"],
  "Firespitter":       ["Lvl 1","Lvl 2","Lvl 3"],
  "Giant Bomb":        ["Lvl 6","Lvl 7&8","Lvl 9&10","Lvl 11"],
  "Giga Bomb":         ["Lvl 2","Lvl 3","Lvl 4"],
  "Gold Mine":         ["Lvl 17"],
  "Gold Storage":      ["Lvl 18","Lvl 19"],
  "Hero Hall":         ["Lvl 1","Lvl 11&12"],
  "Hidden Tesla":      ["Lvl 16","Lvl 17"],
  "Inferno Tower":     ["Lvl 1","Lvl 2","Lvl 3","Lvl 4","Lvl 5","Lvl 6","Lvl 7","Lvl 8","Lvl 9","Lvl 10","Lvl 11","Lvl 12"],
  "Laboratory":        ["Lvl 16"],
  "Monolith":          ["Lvl 1","Lvl 2","Lvl 3","Lvl 4"],
  "Mortar":            ["Lvl 1","Lvl 2","Lvl 3","Lvl 4","Lvl 5","Lvl 6","Lvl 7","Lvl 8","Lvl 9","Lvl 10","Lvl 11","Lvl 12","Lvl 13","Lvl 14","Lvl 15","Lvl 16","Lvl 17","Lvl 18"],
  "Multi-Archer Tower":["Lvl 1","Lvl 2","Lvl 3","Lvl 4"],
  "Multi-Gear Tower":  ["Lvl 3"],
  "Pet House":         ["Lvl 12"],
  "Revenge Tower":     ["Lvl 1","Lvl 2"],
  "Ricochet Cannon":   ["Lvl 1","Lvl 2","Lvl 3","Lvl 4"],
  "Scattershot":       ["Lvl 1","Lvl 2","Lvl 3","Lvl 4","Lvl 5","Lvl 6&7&8"],
  "Seeking Air Mine":  ["Lvl 5&6","Lvl 7&8"],
  "Skeleton Trap":     ["Lvl 5"],
  "Spell Tower":       ["Lvl 2","Lvl 3","Lvl 4"],
  "Spring Trap":       ["Lvl 1&2","Lvl 7&8","Lvl 9&10","Lvl 11&12","Lvl 13"],
  "Super Wizard Tower":["Lvl 1","Lvl 2"],
  "Town Hall":         ["Lvl 18"],
  "Wizard Tower":      ["Lvl 1","Lvl 2","Lvl 3","Lvl 4","Lvl 5","Lvl 6","Lvl 7","Lvl 8","Lvl 9","Lvl 10","Lvl 11","Lvl 12","Lvl 13","Lvl 14","Lvl 15","Lvl 16","Lvl 17"],
  "Workshop":          ["Lvl 8"],
  "X-Bow":             ["Lvl 1","Lvl 2","Lvl 3","Lvl 4","Lvl 5","Lvl 6","Lvl 7","Lvl 8","Lvl 9","Lvl 10","Lvl 11","Lvl 12&13&14"],
};

function getUpgradeImage(name) {
  if (!name) return 'Images/Upgrades/PH.png';
  const base = 'Images/Upgrades/';
  for (const h of HERO_NAMES) if (name.includes(h)) return base + h + '.png';
  const m = name.match(/^(.+?)\s*(?:#\d+)?\s+(?:Level|Lvl)\s+(\d+)/i);
  if (!m) return base + 'PH.png';
  const bn = m[1].trim(), lv = parseInt(m[2]);
  if (!IMAGE_MAP[bn]) return base + 'PH.png';
  for (const ls of IMAGE_MAP[bn]) {
    if (ls === `Lvl ${lv}` || ls === `Level ${lv}`) return base + bn + ' ' + ls + '.png';
    if (ls.includes('&') && ls.match(/\d+/g).map(Number).includes(lv)) return base + bn + ' ' + ls + '.png';
  }
  return base + 'PH.png';
}

/* ── STATE ── */
let ganttData         = [];
let boostPlan         = [];
let currentWork       = {};
let activeBuilders    = new Set([1,2,3,4,5,6]);
let todayStart        = null;
let rangeEnd          = null;
let ganttZoom         = 1.0;   /* 0.25 … 4.0 */
let mobileOrientation = 'vertical'; /* 'vertical' | 'horizontal' */
let originalGanttData = null;  /* snapshot on load for diff/save */
let hasPendingChanges = false;
let dragState         = null;  /* active drag context */
let dragModeEnabled   = false; /* must be ON to drag; prevents pinch-scroll conflicts */
let _violations       = { violatingUids: new Set(), blockerUids: new Set() };
let _hasViolations    = false;
let _minScrollDesktop      = 0;    /* px: leftmost allowed scrollLeft on ganttWrap */
let _minScrollMobileH      = 0;    /* px: leftmost allowed scrollLeft on mobileColumns (horiz) */
let _preserveScrollDesktop = null; /* set in onDragEnd so RAF restores instead of jumping to NOW */
let _preserveScrollMobile  = null;
let _vhSyncListener        = null; /* scroll-sync listener for mobileVHeaders — removed on re-render */
let _vhScrollListener      = null; /* vHeaders→mobileColumns scroll-sync listener — removed on re-render */
let _syncingScroll         = false; /* mutex prevents bidirectional scroll loops */
let _edgeScrollDeltaY      = 0;    /* vertical edge-scroll velocity for rAF loop */
let _edgeScrollRafId       = null; /* rAF handle for vertical edge-scroll loop */

function jumpToNow() {
  const isMobile = window.innerWidth <= 768;
  if (isMobile) {
    if (mobileOrientation === 'vertical') {
      const col = document.getElementById('mobileColumns');
      if (col) col.scrollIntoView({ behavior: 'smooth', block: 'start' });
    } else {
      const wrapper = document.getElementById('mobileColumns');
      if (wrapper) wrapper.scrollTo({ left: _minScrollMobileH, behavior: 'smooth' });
    }
  } else {
    const wrap = document.getElementById('ganttWrap');
    if (wrap) wrap.scrollTo({ left: _minScrollDesktop, behavior: 'smooth' });
  }
}

/* ── INIT ── */
document.addEventListener('DOMContentLoaded', () => {
  let u = localStorage.getItem('coc_username');
  if (u && u.endsWith('_CURRENT_WORK')) u = u.replace('_CURRENT_WORK','');
  if (!u || u === 'null' || u.trim() === '') { window.location.href = 'index.html'; return; }
  window.COC_USERNAME = u;

document.getElementById('zoomIn').addEventListener('click',  () => { ganttZoom = Math.min(ganttZoom + 0.25, 4);    applyZoom(); });
  document.getElementById('zoomOut').addEventListener('click', () => { ganttZoom = Math.max(ganttZoom - 0.25, 0.25); applyZoom(); });
  document.getElementById('mobileZoomIn')?.addEventListener('click',  () => { ganttZoom = Math.min(ganttZoom + 0.25, 4);    applyMobileZoom(); });
  document.getElementById('mobileZoomOut')?.addEventListener('click', () => { ganttZoom = Math.max(ganttZoom - 0.25, 0.25); applyMobileZoom(); });

  function jumpToWindow(days) {
    const isMobile = window.innerWidth <= 768;
    if (isMobile) {
      const wrapper = document.getElementById('mobileColumns');
      if (!wrapper || !todayStart) return;
      const isVert = mobileOrientation === 'vertical';
      const LW     = isVert ? 58 : 80;
      const basePX = isVert ? 110 : 140;
      const avail  = wrapper.clientWidth - LW;
      ganttZoom    = Math.min(Math.max(Math.round(avail / days) / basePX, 0.1), 4);
      applyMobileZoom();
      wrapper.scrollLeft = 0;
    } else {
      const wrap = document.getElementById('ganttWrap');
      if (!wrap || !todayStart) return;
      const availPx = wrap.clientWidth - 130;
      ganttZoom = Math.min(Math.max(Math.round(availPx / days) / 140, 0.1), 4);
      applyZoom();
      wrap.scrollLeft = 0;
    }
  }
  document.getElementById('jump1W')?.addEventListener('click', () => jumpToWindow(7));
  document.getElementById('jump1M')?.addEventListener('click', () => jumpToWindow(30));
  document.getElementById('jump3M')?.addEventListener('click', () => jumpToWindow(90));
  document.getElementById('mJump1W')?.addEventListener('click', () => jumpToWindow(7));
  document.getElementById('mJump1M')?.addEventListener('click', () => jumpToWindow(30));
  document.getElementById('mJump3M')?.addEventListener('click', () => jumpToWindow(90));

  // Mobile orientation toggle
  document.getElementById('mobileOrientBtn')?.addEventListener('click', () => {
    mobileOrientation = mobileOrientation === 'vertical' ? 'horizontal' : 'vertical';
    const btn = document.getElementById('mobileOrientBtn');
    if (mobileOrientation === 'horizontal') {
      btn.textContent = '↕ Vertical'; btn.classList.add('active');
    } else {
      btn.textContent = '⇄ Horizontal'; btn.classList.remove('active');
    }
    renderMobile();
  });

  loadGantt();

  /* Clamp scroll so the user can never scroll left of the NOW line */
  document.getElementById('ganttWrap').addEventListener('scroll', function() {
    if (this.scrollLeft < _minScrollDesktop) this.scrollLeft = _minScrollDesktop;
  });
  document.getElementById('mobileColumns').addEventListener('scroll', function() {
    if (mobileOrientation === 'horizontal' && this.scrollLeft < _minScrollMobileH) {
      this.scrollLeft = _minScrollMobileH;
    }
  });

  /* Warn user if they try to leave with unsaved changes */
  window.addEventListener('beforeunload', e => {
    if (hasPendingChanges) { e.preventDefault(); e.returnValue = ''; }
  });
});

/* ════════════════════════════════════════════
   VIOLATION DETECTION
   Flags any upgrade whose immediately-preceding level (same base name, level-1)
   hasn't finished yet — i.e. it would start before the prior level ends.
════════════════════════════════════════════ */
function detectViolations() {
  const byBase = new Map(); // normalised base → [{upg, level}]
  for (const b of ganttData) {
    for (const upg of b.upgrades) {
      if (!upg._startDate || !upg._endDate || !upg._uid) continue;
      const m = (upg.upgrade || '').match(/^(.+?)\s+(?:Level|Lvl)\s+(\d+)$/i);
      if (!m) continue;
      const base  = m[1].trim().toLowerCase();
      const level = parseInt(m[2]);
      if (!byBase.has(base)) byBase.set(base, []);
      byBase.get(base).push({ upg, level });
    }
  }

  const violatingUids = new Set();
  const blockerUids   = new Set();

  for (const [, items] of byBase) {
    for (const item of items) {
      // Find any occurrence of the same building at level-1
      const prevItems = items.filter(i => i.level === item.level - 1);
      for (const prev of prevItems) {
        // Violation: prev level ends AFTER this level starts
        if (prev.upg._endDate > item.upg._startDate) {
          violatingUids.add(item.upg._uid);
          blockerUids.add(prev.upg._uid);
        }
      }
    }
  }

  _violations    = { violatingUids, blockerUids };
  _hasViolations = violatingUids.size > 0;
}

function updateSaveBtnViolation() {
  document.querySelectorAll('.save-btn').forEach(btn => {
    const isMobileBtn = btn.id === 'saveBtnMobile';
    if (_hasViolations && hasPendingChanges) {
      btn.disabled = true;
      btn.classList.remove('has-changes');
      btn.classList.add('has-violations');
      btn.textContent = isMobileBtn ? '⚠️ Fix Order' : '⚠️ Fix Level Order First';
    } else if (hasPendingChanges) {
      btn.disabled = false;
      btn.classList.add('has-changes');
      btn.classList.remove('has-violations');
      btn.textContent = isMobileBtn ? '💾 Save' : '💾 Save Order';
    } else {
      btn.classList.remove('has-violations');
    }
  });
}

function applyZoom() {
  document.getElementById('zoomLevel').textContent = Math.round(ganttZoom * 100) + '%';
  renderDesktop();
}

function applyMobileZoom() {
  document.getElementById('mobileZoomLevel').textContent = Math.round(ganttZoom * 100) + '%';
  renderMobile();
}
  
/* ── LOAD ── */
async function loadGantt() {
  if (hasPendingChanges) {
    if (!confirm('You have unsaved reorder changes. Refresh and discard them?')) return;
    setSaveState(false);
  }
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('loading'); btn.textContent = '↻ Loading…';
  setLoading(true);
  try {
    const [details, boosts, work] = await Promise.all([
      fetchAllBuilderDetails(),
      fetchBoostPlan(),
      fetchCurrentWork()
    ]);
    ganttData   = details;
    boostPlan   = boosts;
    currentWork = work;
    stitchTimelines();
    annotateOriginalPositions();
    computeRange();
    renderDesktop();
    renderMobile();
    setLoading(false);
  } catch(e) {
    console.error('Gantt load failed:', e);
    document.getElementById('stateMsg').innerHTML       = '<span style="color:#f44336">⚠️ Failed to load.</span>';
    document.getElementById('stateMsgMobile').innerHTML = '<span style="color:#f44336">⚠️ Failed to load.</span>';
  } finally {
    btn.classList.remove('loading'); btn.textContent = '↻ Refresh';
  }
}

function setLoading(on) {
  document.getElementById('stateMsg').style.display       = on ? 'flex'  : 'none';
  document.getElementById('ganttDesktop').style.display   = on ? 'none'  : 'block';
  document.getElementById('stateMsgMobile').style.display = on ? 'flex'  : 'none';
  document.getElementById('mobileColumns').style.display  = on ? 'none'  : 'flex';
  const vh = document.getElementById('mobileVHeaders');
  if (vh && on) vh.style.display = 'none'; /* renderMobileVertical will re-show it */
  const isMobile = window.innerWidth <= 768;
  document.getElementById('zoomBar').style.display = (!on && !isMobile) ? 'flex' : 'none';
}

async function fetchAllBuilderDetails() {
  const results = [];
  await Promise.all([1,2,3,4,5,6].map(async n => {
    try {
      const res  = await fetch(`${API_BASE}?action=builder_details&username=${window.COC_USERNAME}&builder=Builder_${n}`);
      const data = await res.json();
      if (data.builder && data.upgrades) results.push({ builderNum:n, upgrades:data.upgrades });
    } catch(e) { console.warn(`Builder ${n}:`, e); }
  }));
  results.sort((a,b) => a.builderNum - b.builderNum);
  return results;
}

async function fetchBoostPlan() {
  try {
    const res  = await fetch(`${API_BASE}?action=boost_plan&username=${window.COC_USERNAME}`);
    const data = await res.json();
    if (!data?.table || data.table.length <= 1) return [];
    return data.table.slice(1).map(row => ({ date:row[0], builderRaw:row[2], newFinish:row[4], mode:row[5] }));
  } catch(e) { return []; }
}

async function fetchCurrentWork() {
  try {
    const res  = await fetch(`${API_BASE}?action=current_work_table&username=${window.COC_USERNAME}`);
    const data = await res.json();
    const map  = {};
    for (let i = 1; i < data.length; i++) {
      const row = data[i];
      const num = row[0]?.toString().match(/(\d+)/)?.[1];
      if (!num) continue;
      map[parseInt(num)] = { upgrade:row[1], finishTime:parseDate(row[2]), timeLeftMs:parseTimeLeftMs(row[3]||'') };
    }
    return map;
  } catch(e) { return {}; }
}

/* ════════════════════════════════════════════
   STITCH — correct start times (FIX #1)
   Active upgrade in queue: start = finishTime − durationMinutes  (real actual start)
   Synthetic (not in queue): start = finishTime − timeLeftMs       (≈ now, shows remaining bar)
   Queued items: chained sequentially after active ends
════════════════════════════════════════════ */
function normalizeUpgradeName(n) { return (n||'').trim().toLowerCase().replace(/\s+/g,' '); }

function stitchTimelines() {
  for (const b of ganttData) {
    const cw = currentWork[b.builderNum];

    if (!cw || !cw.finishTime) {
      for (const upg of b.upgrades) {
        upg._startDate = parseDate(upg.start);
        upg._endDate   = parseDate(upg.end);
        upg._isCurrent = false;
      }
      continue;
    }

    const cwEnd = new Date(cw.finishTime);
    let queueStartIdx = 0;

    if (b.upgrades.length > 0 &&
        normalizeUpgradeName(b.upgrades[0].upgrade) === normalizeUpgradeName(cw.upgrade)) {
      /* Active upgrade IS first item in queue.
         Real start = finishTime − total duration (durationMinutes from API). */
      const mins0 = b.upgrades[0].durationMinutes || 0;
      b.upgrades[0]._startDate = mins0 > 0
        ? new Date(cwEnd.getTime() - mins0 * 60000)          /* ← correct actual start */
        : new Date(cwEnd.getTime() - (cw.timeLeftMs || 0));  /* fallback if no duration */
      b.upgrades[0]._endDate   = cwEnd;
      b.upgrades[0]._isCurrent = true;
      queueStartIdx = 1;
    } else {
      /* Active upgrade NOT in queue — synthetic bar.
         Show from (finishTime − timeLeft) → finishTime so bar = remaining time. */
      const synStart = cw.timeLeftMs > 0
        ? new Date(cwEnd.getTime() - cw.timeLeftMs)
        : new Date();
      b.upgrades.unshift({
        upgrade:cw.upgrade, duration:'', durationMinutes:Math.round((cw.timeLeftMs||0)/60000),
        _startDate:synStart, _endDate:cwEnd, _isCurrent:true, _synthetic:true
      });
      queueStartIdx = 1;
    }

    /* Chain queue sequentially */
    let cursor = cwEnd;
    for (let i = queueStartIdx; i < b.upgrades.length; i++) {
      const upg = b.upgrades[i];
      const mins = upg.durationMinutes || 0;
      upg._startDate = new Date(cursor);
      upg._endDate   = new Date(cursor.getTime() + mins * 60000);
      upg._isCurrent = false;
      cursor = upg._endDate;
    }
  }
}

/* ── DATE HELPERS ── */
function parseDate(raw) {
  if (!raw) return null;
  if (raw instanceof Date) return raw;
  if (typeof raw === 'string' && (raw.includes('T') || raw.match(/^\d{4}-/))) {
    const d = new Date(raw); if (!isNaN(d)) return d;
  }
  const yr = new Date().getFullYear();
  for (const y of [yr, yr+1]) { const d = new Date(`${raw} ${y}`); if (!isNaN(d)) return d; }
  return null;
}
function daysBetween(a, b) { return (b - a) / 86400000; }
function parseTimeLeftMs(s) {
  const dm = (s.match(/(\d+)\s*d/)  ||[0,0])[1];
  const hm = (s.match(/(\d+)\s*hr/) ||[0,0])[1];
  const mm = (s.match(/(\d+)\s*min/)||[0,0])[1];
  return (parseInt(dm)*1440 + parseInt(hm)*60 + parseInt(mm)) * 60000;
}
function fmtDate(d) {
  if (!d||isNaN(d)) return '—';
  return d.toLocaleString('en-US',{timeZone:'America/New_York',month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true});
}
function fmtDay(d) { return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function fmtShort(d) {
  if (!d||isNaN(d)) return '';
  return d.toLocaleString('en-US',{timeZone:'America/New_York',month:'numeric',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true});
}
function fmtShortHTML(d) {
  if (!d||isNaN(d)) return '';
  const date = d.toLocaleDateString('en-US',{timeZone:'America/New_York',month:'numeric',day:'numeric'});
  const time = d.toLocaleTimeString('en-US',{timeZone:'America/New_York',hour:'numeric',minute:'2-digit',hour12:true});
  return `${date}<br><span style="opacity:.8;font-size:7.5px">${time}</span>`;
}

/* ── RANGE ── */
function computeRange() {
  todayStart = new Date(); todayStart.setHours(0,0,0,0);
  let maxEnd = new Date(todayStart); maxEnd.setDate(maxEnd.getDate() + 7);
  for (const b of ganttData) for (const u of b.upgrades) { if (u._endDate && u._endDate > maxEnd) maxEnd = u._endDate; }
  rangeEnd = new Date(maxEnd); rangeEnd.setHours(23,59,59,999);
}

/* ── BOOSTS ── */
function parseBoostDate(raw) {
  if (!raw||raw==='TODAY') { const d=new Date(); d.setHours(12,0,0,0); return d; }
  const yr = new Date().getFullYear();
  for (const y of [yr,yr+1]) { const d=new Date(`${raw} ${y}`); if (!isNaN(d)) return d; }
  return null;
}
function getBoosts(builderNum, startD, endD) {
  const out = [];
  if (!startD||!endD) return out;
  for (const bp of boostPlan) {
    const n = bp.builderRaw?.match(/(\d+)/)?.[1];
    if (!n||parseInt(n)!==builderNum) continue;
    const bd = parseBoostDate(bp.date);
    if (bd && bd>=startD && bd<=endD) out.push({date:bd,newFinish:bp.newFinish,mode:bp.mode});
  }
  return out;
}
function hexAlpha(hex, a) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

/* ════════════════════════════════════════════
   DESKTOP RENDER
   FIX #2: only active rows rendered (no gaps when toggled off)
   FIX #3: zoom + hour sub-ticks
   FIX #4: duration + finish time in bar label
   FIX #5: bar-inner position:sticky (follows horizontal scroll)
   FIX #6: image = full bar height
════════════════════════════════════════════ */
function renderDesktop() {
  detectViolations();
  const wrap = document.getElementById('ganttWrap');
  const _savedScrollDesktop = wrap ? wrap.scrollLeft : 0;
  const container = document.getElementById('ganttDesktop');
  container.innerHTML = '';

const PX  = Math.max(Math.round(140 * ganttZoom), 20);  /* px per day */
  const LW  = 130;              /* label-col width */
  const nowOffsetPx = (Date.now() - todayStart.getTime()) / (24 * 60 * 60 * 1000) * PX; /* px from midnight to now */
  /* Distribute height: 6 builders = 90px each. Fewer builders = proportionally taller rows */
  const visibleCount = activeBuilders.size || 1;
  const RH  = Math.min(Math.round(90 * (6 / visibleCount)), 200); /* row height, max 200px */
  const BT  = Math.round(RH * 0.09);  /* ~9% top padding */
  const BH  = RH - BT * 2;     /* bar height */
  
  /* Hour sub-tick interval: denser when zoomed in */
  const hourStep = ganttZoom >= 2 ? 2 : ganttZoom >= 1 ? 6 : 12;

  const totalDays = Math.ceil(daysBetween(todayStart, rangeEnd)) + 2;
  const days = Array.from({length:totalDays},(_,i)=>{ const d=new Date(todayStart); d.setDate(d.getDate()+i); return d; });
  const totalW = LW + totalDays * PX;

  const canvas = document.createElement('div');
  canvas.style.cssText = `position:relative; min-width:${totalW}px;`;

  /* ── DATE HEADER ── */
  const header = document.createElement('div');
  header.style.cssText = `display:flex; position:sticky; top:0; z-index:12; background:var(--bg); border-bottom:2px solid var(--border);`;

  const corner = document.createElement('div');
  corner.style.cssText = `width:${LW}px; flex-shrink:0; position:sticky; left:0; z-index:13; background:var(--bg); padding:0 14px; border-right:1px solid var(--border); display:flex; align-items:center; font-size:10px; font-weight:700; color:var(--text-dim); text-transform:uppercase;`;
  corner.textContent = 'Builder';
  header.appendChild(corner);

  days.forEach((d, i) => {
    const isMonth = i > 0 && d.getDate() === 1;
    const cell = document.createElement('div');
    cell.style.cssText = `width:${PX}px; flex-shrink:0; display:flex; flex-direction:column; border-left:${isMonth?'2px solid rgba(255,255,255,0.2)':'1px solid var(--border)'};`;
const dayLbl = document.createElement('div');
    // When zoomed out (PX < 40), only show month name at month boundary
    const showMonthOnly = PX < 40;
    let labelText;
    if (i === 0) {
      labelText = showMonthOnly ? '▶' : 'TODAY';
    } else if (showMonthOnly) {
      labelText = isMonth ? d.toLocaleDateString('en-US',{month:'short'}).toUpperCase() : '';
    } else {
      labelText = fmtDay(d);
    }
    dayLbl.style.cssText = `padding:5px 0 2px; font-size:${i===0?11:9}px; font-weight:${i===0||isMonth?800:600}; color:${i===0?'var(--gold)':isMonth?'rgba(255,255,255,0.55)':'var(--text-dim)'}; text-align:center; white-space:nowrap; overflow:hidden;`;
    dayLbl.textContent = labelText;
    cell.appendChild(dayLbl);
    
    /* Hour sub-label row (FIX #3) */
    const hourRow = document.createElement('div');
    hourRow.style.cssText = `flex:1; display:flex; border-top:1px solid var(--border);`;
    for (let h = 0; h < 24; h += hourStep) {
      const hd = document.createElement('div');
      hd.style.cssText = `flex:${hourStep}; font-size:7px; color:rgba(255,255,255,0.2); font-weight:600; padding:2px 1px; border-left:${h===0?'none':'1px solid rgba(255,255,255,0.04)'}; white-space:nowrap; overflow:hidden;`;
      hd.textContent = h === 0 ? '' : `${h}h`;
      hourRow.appendChild(hd);
    }
    cell.appendChild(hourRow);
    header.appendChild(cell);
  });
  canvas.appendChild(header);

  /* ── ROWS — only visible builders, no gap (FIX #2) ── */
  const visible = ganttData.filter(b => activeBuilders.has(b.builderNum));

  visible.forEach((b, bi) => {
    const bColor = BUILDER_COLORS[b.builderNum];

    const row = document.createElement('div');
    row.style.cssText = `display:flex; position:relative; height:${RH}px; border-bottom:1px solid var(--border);`;
    row.dataset.builder = b.builderNum;

    /* Sticky label column */
    const labelEl = document.createElement('div');
    labelEl.style.cssText = `width:${LW}px; flex-shrink:0; position:sticky; left:0; z-index:9; background:var(--bg); display:flex; align-items:center; gap:8px; padding:0 12px; border-right:1px solid var(--border); border-left:3px solid ${bColor};`;
    labelEl.innerHTML = `
      <img src="Images/Builders/Builder ${b.builderNum}.png" style="width:30px;height:30px;object-fit:contain" onerror="this.style.display='none'" alt="">
      <div>
        <div style="font-size:12px;font-weight:800;color:${bColor};line-height:1.2">Builder ${b.builderNum}</div>
        <div style="font-size:9px;color:var(--text-dim);font-weight:600">${b.upgrades.length} upgrade${b.upgrades.length!==1?'s':''}</div>
      </div>`;
    row.appendChild(labelEl);

    const cell = document.createElement('div');
    cell.style.cssText = `position:relative; flex:1; height:${RH}px; overflow:visible;`;

    /* Grid lines + hour sub-ticks */
    days.forEach((d, i) => {
      const isMonth = i > 0 && d.getDate() === 1;
      const dl = document.createElement('div');
      dl.style.cssText = `position:absolute; top:0; bottom:0; left:${i*PX}px; width:${isMonth?2:1}px; background:${i===0?'rgba(245,208,76,0.18)':isMonth?'rgba(255,255,255,0.13)':'var(--border)'};`;
      cell.appendChild(dl);
      for (let h = hourStep; h < 24; h += hourStep) {
        const ht = document.createElement('div');
        ht.style.cssText = `position:absolute; top:0; bottom:0; left:${i*PX+(h/24)*PX}px; width:1px; background:rgba(255,255,255,0.03);`;
        cell.appendChild(ht);
      }
      if (isMonth && bi === 0) {
        const ml = document.createElement('div');
        ml.style.cssText = `position:absolute; top:2px; left:${i*PX+4}px; font-size:8px; font-weight:800; color:rgba(255,255,255,0.26); letter-spacing:1px; text-transform:uppercase; pointer-events:none; z-index:2;`;
        ml.textContent = d.toLocaleDateString('en-US',{month:'short'}).toUpperCase();
        cell.appendChild(ml);
      }
    });

    if (bi===0) {
      const nowPin = document.createElement('div');
      nowPin.style.cssText = `position:absolute; top:0; left:${nowOffsetPx}px; transform:translateX(-50%); background:var(--gold); color:#000; font-size:8px; font-weight:800; padding:2px 6px; border-radius:0 0 4px 4px; white-space:nowrap; z-index:20;`;
      nowPin.textContent = 'NOW';
      cell.appendChild(nowPin);
    }

    /* ── BARS ── */
    b.upgrades.forEach((upg, idx) => {
      const startD = upg._startDate, endD = upg._endDate;
      if (!startD||!endD) return;
      const clampS = Math.max(startD.getTime(), todayStart.getTime());
      const clampE = Math.min(endD.getTime(),   rangeEnd.getTime());
      if (clampS >= clampE) return;

      const leftPx  = daysBetween(todayStart, new Date(clampS)) * PX;
      const widthPx = Math.max(daysBetween(new Date(clampS), new Date(clampE)) * PX, 6);

      const isEven  = idx % 2 === 0;
      const barCol  = isEven ? bColor : hexAlpha(bColor, 0.58);
      const bordCol = (upg.upgrade && upg.upgrade.includes('*')) ? '#093DBA' : upg._isCurrent ? '#ffffff' : isEven ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.18)';

      const bar = document.createElement('div');
      bar.className = 'gantt-bar';
      bar.style.cssText = `left:${leftPx}px; width:${widthPx}px; top:${BT}px; height:${BH}px; background:${barCol}; border-color:${bordCol};`;

      if (upg._isCurrent) {
        const badge = document.createElement('div');
        badge.className = 'bar-active-badge';
        badge.textContent = (upg._startDate && upg._startDate.getTime() < todayStart.getTime())
          ? `▶ since ${fmtDay(upg._startDate)}`
          : '▶ NOW';
        bar.appendChild(badge);
      }

      /* ── STICKY LABEL — follows horizontal scroll (FIX #5) ── */
      const inner = document.createElement('div');
      inner.className = 'bar-inner';
      inner.style.left = LW + 'px'; /* pin label to right edge of label column */

     /* Image — transparent background, clipped to bar height */
      const isSC = upg.upgrade && upg.upgrade.includes('*');
      const imgEl = document.createElement('img');
      imgEl.className = 'bar-icon';
      imgEl.style.cssText = `width:${Math.min(BH, widthPx - 4)}px; height:${BH}px; max-width:${BH}px;${isSC ? ' filter:drop-shadow(0 0 5px rgba(9,61,186,0.85));' : ''}`;
      imgEl.src = isSC ? getSuperchargeImage(upg.upgrade) : getUpgradeImage(upg.upgrade);
      imgEl.onerror = () => imgEl.src = 'Images/Upgrades/PH.png';
      imgEl.alt = upg.upgrade || '';
      if (isSC) {
        const scWrap = document.createElement('div');
        scWrap.style.cssText = 'position:relative;display:inline-flex;flex-shrink:0;';
        const scOverlay = document.createElement('div');
        scOverlay.style.cssText = 'position:absolute;inset:0;background:rgba(9,61,186,0.10);border-radius:5px;pointer-events:none;';
        scWrap.appendChild(imgEl);
        scWrap.appendChild(scOverlay);
        inner.appendChild(scWrap);
      } else {
        inner.appendChild(imgEl);
      }

      /* Name + duration — shown when bar is wider than 180px */
      if (widthPx > 180) {
        const textCol = document.createElement('div');
        textCol.className = 'bar-text-col';
        textCol.innerHTML = `
          <div class="bar-name">${formatUpgradeName(upg.upgrade)}</div>
          ${upg.duration && widthPx > 260 ? `<div class="bar-dur">${upg.duration}</div>` : ''}`;
        inner.appendChild(textCol);
      }
      bar.appendChild(inner);

      /* End-time badge pinned to right side of bar */
      if (widthPx > 60) {
        const endBadge = document.createElement('div');
        endBadge.className = 'bar-end-badge';
        endBadge.innerHTML = fmtShortHTML(endD);
        bar.appendChild(endBadge);
      }

      /* Boost markers */
      const boosts = getBoosts(b.builderNum, startD, endD);
      boosts.forEach(boost => {
        const bPx = daysBetween(todayStart, boost.date) * PX - leftPx;
        if (bPx < 0 || bPx > widthPx) return;
        const dot = document.createElement('div');
        dot.className = 'gantt-boost-marker';
        dot.style.left = Math.max(bPx-7, 0) + 'px';
        dot.textContent = '⚡';
        bar.appendChild(dot);
      });

      /* Drag handling */
      bar.dataset.upgUid    = upg._uid || '';
      bar.dataset.draggable = (upg._isCurrent || upg._synthetic) ? '0' : '1';
      if (!upg._isCurrent && !upg._synthetic && upg._uid) {
        bar.style.cursor = 'grab';
        bar.addEventListener('mousedown',  e => { if (e.button !== 0) return; e.stopPropagation(); startDrag(e, b.builderNum, upg, bar); });
        bar.addEventListener('touchstart', e => { if (dragModeEnabled) { e.stopPropagation(); startDrag(e, b.builderNum, upg, bar); } }, { passive: true });
      }
      bar.addEventListener('mouseenter', e => showTooltip(e, upg, b.builderNum, boosts, startD, endD));
      bar.addEventListener('mousemove',  e => moveTooltip(e));
      bar.addEventListener('mouseleave', hideTooltip);
      /* Violation highlighting */
      if (_violations.violatingUids.has(upg._uid)) bar.classList.add('violation-bar');
      if (_violations.blockerUids.has(upg._uid))   bar.classList.add('blocker-bar');
      cell.appendChild(bar);
    });

    row.appendChild(cell);
    canvas.appendChild(row);
  });

  /* Vertical "now" line spanning all rows */
  const nowLine = document.createElement('div');
  nowLine.style.cssText = `position:absolute; top:0; bottom:0; left:${LW + nowOffsetPx}px; width:2px; background:var(--gold); opacity:0.55; z-index:11; pointer-events:none;`;
  canvas.appendChild(nowLine);

  container.appendChild(canvas);
  updateSaveBtnViolation();

  requestAnimationFrame(() => {
    _minScrollDesktop = nowOffsetPx;
    if (_preserveScrollDesktop !== null) {
      wrap.scrollLeft = Math.max(_preserveScrollDesktop, _minScrollDesktop);
      _preserveScrollDesktop = null;
    } else {
      wrap.scrollLeft = _minScrollDesktop;
    }
  });
}

/* ════════════════════════════════════════════
   MOBILE RENDER — branches on mobileOrientation
════════════════════════════════════════════ */
function renderMobile() {
  detectViolations();
  const vHeaders = document.getElementById('mobileVHeaders');
  if (mobileOrientation === 'horizontal') {
    if (vHeaders) vHeaders.style.display = 'none';
    renderMobileHorizontal();
  } else {
    renderMobileVertical(); /* vHeaders shown inside renderMobileVertical */
    updateSaveBtnViolation();
  }
}

/* ── VERTICAL (columns, time flows down) ── */
function renderMobileVertical() {
  const wrapper  = document.getElementById('mobileColumns');
  const vHeaders = document.getElementById('mobileVHeaders');

  /* Remove previous scroll-sync listeners before clearing DOM */
  if (_vhSyncListener)   { wrapper.removeEventListener('scroll', _vhSyncListener);   _vhSyncListener   = null; }
  if (_vhScrollListener) { vHeaders && vHeaders.removeEventListener('scroll', _vhScrollListener); _vhScrollListener = null; }

  /* Prevent page-scroll collapse during DOM rebuild (keeps window.scrollY stable) */
  const _prevBodyH = wrapper.scrollHeight;
  if (_prevBodyH > 0) wrapper.style.minHeight = _prevBodyH + 'px';
  wrapper.innerHTML = '';
  wrapper.style.minHeight = '';
  wrapper.style.display = 'flex';

  const PX = Math.max(Math.round(110 * ganttZoom), 20);
  const COL_HEAD_H = 84;
  const _hdr  = document.querySelector('.gantt-header')?.offsetHeight   || 51;
  const _tgl  = document.querySelector('.builder-toggles')?.offsetHeight || 51;
  const _mzb  = document.querySelector('.mobile-zoom-bar')?.offsetHeight || 85;
  const HEADER_STICKY_TOP = _hdr + _tgl + _mzb;
  /* Bar labels still need to clear the sticky header row (COL_HEAD_H tall) */
  const STICKY_TOP = HEADER_STICKY_TOP + COL_HEAD_H - 8;
  const showText = ganttZoom > 0.5;
  const nowOffsetPxV = (Date.now() - todayStart.getTime()) / (24 * 60 * 60 * 1000) * PX;

  const totalDays = Math.ceil(daysBetween(todayStart, rangeEnd)) + 2;
  const days = Array.from({length:totalDays},(_,i)=>{ const d=new Date(todayStart); d.setDate(d.getDate()+i); return d; });
  const bodyH = totalDays * PX;

  /* ── Sticky header row (outside mobileColumns so overflow-x:auto doesn't trap it) ──
     Contains: [Date label | B1 header | B2 header | …]
     Horizontal position synced with mobileColumns scrollLeft via JS transform          */
  if (vHeaders) {
    vHeaders.innerHTML = '';
    /* vHeaders is now a real native scroll container — bidirectionally synced with mobileColumns */
    vHeaders.style.cssText = `display:flex; position:sticky; top:${HEADER_STICKY_TOP}px; z-index:20; background:var(--bg); border-bottom:2px solid var(--border); height:${COL_HEAD_H}px; overflow-x:auto; overflow-y:hidden; scrollbar-width:none;`;

    /* "Date" cell — sticky left inside scroll container */
    const vhTime = document.createElement('div');
    vhTime.style.cssText = `width:58px; flex-shrink:0; position:sticky; left:0; z-index:21; background:var(--bg); border-right:1px solid var(--border); display:flex; align-items:flex-end; padding:0 5px 8px; font-size:9px; font-weight:700; color:var(--text-dim); text-transform:uppercase;`;
    vhTime.textContent = 'Date';
    vHeaders.appendChild(vhTime);

    /* Column header cells — natural flow, no transform needed */
    const vhInner = document.createElement('div');
    vhInner.id = 'mobileVHeadersInner';
    vhInner.style.cssText = `display:flex; flex-shrink:0;`;
    for (let n = 1; n <= 6; n++) {
      const bd = ganttData.find(b => b.builderNum === n);
      const bColor = BUILDER_COLORS[n];
      const upgCount = bd ? bd.upgrades.length : 0;
      const hCell = document.createElement('div');
      hCell.dataset.vhBuilder = n;
      hCell.style.cssText = `width:120px; flex-shrink:0; flex-direction:column; align-items:center; justify-content:center; gap:3px; padding:6px 4px; border-bottom:3px solid ${bColor}; border-right:1px solid var(--border); display:${activeBuilders.has(n)?'flex':'none'};`;
      hCell.innerHTML = `
        <img src="Images/Builders/Builder ${n}.png" style="width:24px;height:24px;object-fit:contain" onerror="this.style.display='none'" alt="">
        <span style="color:${bColor};font-size:11px;font-weight:700">B${n}</span>
        <span style="color:var(--text-dim);font-size:8px;font-weight:700">${upgCount} upg</span>`;
      vhInner.appendChild(hCell);
    }
    vHeaders.appendChild(vhInner);

    /* mobileColumns → vHeaders sync (and time axis transform) */
    _vhSyncListener = function() {
      if (_syncingScroll) return;
      _syncingScroll = true;
      vHeaders.scrollLeft = this.scrollLeft;
      const timeAxis = document.getElementById('mobileTimeAxisEl');
      if (timeAxis) timeAxis.style.transform = `translateX(${this.scrollLeft}px)`;
      _syncingScroll = false;
    };
    wrapper.addEventListener('scroll', _vhSyncListener);

    /* vHeaders → mobileColumns sync (user swipes the header row directly) */
    _vhScrollListener = function() {
      if (_syncingScroll) return;
      _syncingScroll = true;
      wrapper.scrollLeft = vHeaders.scrollLeft;
      const timeAxis = document.getElementById('mobileTimeAxisEl');
      if (timeAxis) timeAxis.style.transform = `translateX(${vHeaders.scrollLeft}px)`;
      _syncingScroll = false;
    };
    vHeaders.addEventListener('scroll', _vhScrollListener);
  }

  /* Time axis — no header here (it's in vHeaders now) */
  const axis = document.createElement('div');
  axis.className = 'mobile-time-axis';
  axis.id = 'mobileTimeAxisEl';
  days.forEach((d,i) => {
    const t = document.createElement('div');
    t.className = 'mobile-time-tick' + (i===0?' today-row':'');
    t.style.height = PX + 'px';
    t.style.position = 'relative';
    t.textContent = i===0 ? '▶ Now' : fmtDay(d);
    axis.appendChild(t);
  });
  const axisNowLine = document.createElement('div');
  /* top offset no longer includes COL_HEAD_H — axis starts with ticks now */
  axisNowLine.style.cssText = `position:absolute; left:0; right:0; top:${nowOffsetPxV}px; height:2px; background:var(--gold); opacity:0.7; z-index:5; pointer-events:none;`;
  axis.style.position = 'relative';
  axis.appendChild(axisNowLine);
  wrapper.appendChild(axis);

  /* Builder columns — no col-header inside (it's in vHeaders now) */
  for (let n = 1; n <= 6; n++) {
    const bd = ganttData.find(b => b.builderNum === n);
    const bColor = BUILDER_COLORS[n];

    const col = document.createElement('div');
    col.className = 'mobile-builder-col';
    col.dataset.builder = n;
    if (!activeBuilders.has(n)) col.classList.add('hidden-col');

    const colBody = document.createElement('div');
    colBody.className = 'mobile-col-body';
    colBody.style.height = bodyH + 'px';

    days.forEach((d,i) => {
      const isMonth = i > 0 && d.getDate() === 1;
      const dr = document.createElement('div');
      dr.style.cssText = `position:absolute; left:0; right:0; top:${i*PX}px; height:${PX}px; border-top:${isMonth?'2px':'1px'} solid ${i===0?'rgba(245,208,76,0.3)':isMonth?'rgba(255,255,255,0.16)':'var(--border)'};`;
      colBody.appendChild(dr);
    });
    /* Horizontal "now" line in column body */
    const colNowLine = document.createElement('div');
    colNowLine.style.cssText = `position:absolute; left:0; right:0; top:${nowOffsetPxV}px; height:2px; background:var(--gold); opacity:0.55; z-index:5; pointer-events:none;`;
    colBody.appendChild(colNowLine);

    if (bd) {
      bd.upgrades.forEach((upg, idx) => {
        const startD = upg._startDate, endD = upg._endDate;
        if (!startD||!endD) return;
        const clampS = Math.max(startD.getTime(), todayStart.getTime());
        const clampE = Math.min(endD.getTime(), rangeEnd.getTime());
        if (clampS >= clampE) return;

        const topPx = daysBetween(todayStart, new Date(clampS)) * PX;
        const hPx   = Math.max(daysBetween(new Date(clampS), new Date(clampE)) * PX, 8);
        const isEven = idx % 2 === 0;
        const barCol  = isEven ? bColor : hexAlpha(bColor, 0.6);
        const bordCol = (upg.upgrade && upg.upgrade.includes('*')) ? '#093DBA' : upg._isCurrent ? '#fff' : isEven ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.2)';

        const bar = document.createElement('div');
        bar.className = 'mobile-bar';
        bar.style.cssText = `top:${topPx}px; height:${hPx}px; background:${barCol}; border-color:${bordCol};`;

        if (upg._isCurrent) {
          const badge = document.createElement('div');
          badge.style.cssText = `position:absolute;top:0;left:0;right:0;text-align:center;background:rgba(255,255,255,0.92);color:#000;font-size:7px;font-weight:800;padding:1px 4px;border-radius:0 0 4px 4px;white-space:nowrap;pointer-events:none;letter-spacing:.4px;line-height:1.5;z-index:4;`;
          badge.textContent = (upg._startDate && upg._startDate.getTime() < todayStart.getTime()) ? `▶ since ${fmtDay(upg._startDate)}` : '▶ NOW';
          bar.appendChild(badge);
        }

        const lbl = document.createElement('div');
        lbl.className = 'mobile-bar-label';

        const isSCm = upg.upgrade && upg.upgrade.includes('*');
        const imgEl = document.createElement('img');
        imgEl.className = 'mobile-bar-icon';
        imgEl.src = isSCm ? getSuperchargeImage(upg.upgrade) : getUpgradeImage(upg.upgrade);
        imgEl.onerror = () => imgEl.src = 'Images/Upgrades/PH.png';
        imgEl.alt = upg.upgrade || '';
        if (isSCm) {
          imgEl.style.filter = 'drop-shadow(0 0 5px rgba(9,61,186,0.85))';
          const scWrap = document.createElement('div');
          scWrap.style.cssText = 'position:relative;display:inline-flex;flex-shrink:0;';
          const scOverlay = document.createElement('div');
          scOverlay.style.cssText = 'position:absolute;inset:0;background:rgba(9,61,186,0.10);border-radius:7px;pointer-events:none;';
          scWrap.appendChild(imgEl);
          scWrap.appendChild(scOverlay);
          lbl.appendChild(scWrap);
        } else {
          lbl.appendChild(imgEl);
        }

        /* Always show text block; at low zoom only show duration (most useful at a glance) */
        const tb = document.createElement('div');
        tb.className = 'mobile-bar-text-block';
        tb.innerHTML = `
          ${showText ? `<div class="mobile-bar-name">${formatUpgradeName(upg.upgrade)}</div>` : ''}
          ${upg.duration ? `<div class="mobile-bar-dur">${upg.duration}</div>` : ''}`;
        lbl.appendChild(tb);
        bar.appendChild(lbl);

        if (showText) {
          const endLbl = document.createElement('div');
          endLbl.className = 'mobile-bar-end';
          endLbl.innerHTML = fmtShortHTML(endD);
          bar.appendChild(endLbl);
        }

        getBoosts(n, startD, endD).forEach(boost => {
          const bTop = daysBetween(new Date(clampS), boost.date) * PX;
          if (bTop < 0 || bTop > hPx) return;
          const dot = document.createElement('div');
          dot.className = 'mobile-boost-dot';
          dot.style.top = (bTop+2) + 'px';
          dot.textContent = '⚡';
          bar.appendChild(dot);
        });

        const boosts = getBoosts(n, startD, endD);
        /* Drag handling */
        bar.dataset.upgUid    = upg._uid || '';
        bar.dataset.draggable = (upg._isCurrent || upg._synthetic) ? '0' : '1';
        if (!upg._isCurrent && !upg._synthetic && upg._uid) {
          bar.style.cursor = 'grab';
          bar.addEventListener('mousedown',  e => { if (e.button !== 0) return; e.stopPropagation(); startDrag(e, n, upg, bar); });
          bar.addEventListener('touchstart', e => { if (dragModeEnabled) { e.stopPropagation(); startDrag(e, n, upg, bar); } }, { passive: true });
        }
        bar.addEventListener('click', e => { e.stopPropagation(); showSheet(upg, n, boosts, startD, endD); });
        /* Violation highlighting */
        if (_violations.violatingUids.has(upg._uid)) bar.classList.add('violation-bar');
        if (_violations.blockerUids.has(upg._uid))   bar.classList.add('blocker-bar');
        colBody.appendChild(bar);
      });
    }

    col.appendChild(colBody);
    wrapper.appendChild(col);
  }

  /* Restore mobileColumns horizontal scroll position (e.g. after drag re-render) */
  requestAnimationFrame(() => {
    if (_preserveScrollMobile !== null) {
      wrapper.scrollLeft = _preserveScrollMobile;
      _preserveScrollMobile = null;
    }
    /* Sync vHeaders and time axis to current scrollLeft */
    const sl = wrapper.scrollLeft;
    const vh = document.getElementById('mobileVHeaders');
    if (vh) vh.scrollLeft = sl;
    const timeAxis = document.getElementById('mobileTimeAxisEl');
    if (timeAxis) timeAxis.style.transform = `translateX(${sl}px)`;
  });
}

/* ── HORIZONTAL (rows, time flows right — compact desktop style) ── */
function renderMobileHorizontal() {
  const wrapper = document.getElementById('mobileColumns');
  const _savedScrollMobile = wrapper ? wrapper.scrollLeft : 0;
  wrapper.innerHTML = '';
  wrapper.style.display = 'block';
  wrapper.style.overflowX = 'auto';

  const PX  = Math.max(Math.round(140 * ganttZoom), 20);
  const LW  = 80;   /* compact label column */
  const nowOffsetPx = (Date.now() - todayStart.getTime()) / (24 * 60 * 60 * 1000) * PX;
  const RH  = 62;
  const BT  = 6;
  const BH  = RH - BT * 2;

  const totalDays = Math.ceil(daysBetween(todayStart, rangeEnd)) + 2;
  const days = Array.from({length:totalDays},(_,i)=>{ const d=new Date(todayStart); d.setDate(d.getDate()+i); return d; });
  const totalW = LW + totalDays * PX;

  const canvas = document.createElement('div');
  canvas.style.cssText = `position:relative; min-width:${totalW}px;`;

  /* Date header */
  const header = document.createElement('div');
  header.style.cssText = `display:flex; border-bottom:2px solid var(--border); background:var(--bg); position:sticky; top:0; z-index:12;`;

  const corner = document.createElement('div');
  corner.style.cssText = `width:${LW}px; flex-shrink:0; position:sticky; left:0; z-index:13; background:var(--bg); border-right:1px solid var(--border); display:flex; align-items:center; padding:0 8px; font-size:9px; font-weight:700; color:var(--text-dim); text-transform:uppercase;`;
  corner.textContent = 'Builder';
  header.appendChild(corner);

  days.forEach((d, i) => {
    const isMonth = i > 0 && d.getDate() === 1;
    const cell = document.createElement('div');
    const labelText = i===0 ? 'NOW' : PX < 40 ? (isMonth ? d.toLocaleDateString('en-US',{month:'short'}).toUpperCase() : '') : fmtDay(d);
    cell.style.cssText = `width:${PX}px; flex-shrink:0; display:flex; align-items:center; justify-content:center; border-left:${isMonth?'2px solid rgba(255,255,255,0.2)':'1px solid var(--border)'}; padding:4px 0; font-size:${i===0?9:8}px; font-weight:${i===0||isMonth?800:600}; color:${i===0?'var(--gold)':isMonth?'rgba(255,255,255,0.55)':'var(--text-dim)'}; white-space:nowrap; overflow:hidden;`;
    cell.textContent = labelText;
    header.appendChild(cell);
  });
  canvas.appendChild(header);

  /* Builder rows */
  const visible = ganttData.filter(b => activeBuilders.has(b.builderNum));
  visible.forEach((b, bi) => {
    const bColor = BUILDER_COLORS[b.builderNum];

    const row = document.createElement('div');
    row.style.cssText = `display:flex; position:relative; height:${RH}px; border-bottom:1px solid var(--border);`;
    row.dataset.builder = b.builderNum;

    const labelEl = document.createElement('div');
    labelEl.style.cssText = `width:${LW}px; flex-shrink:0; position:sticky; left:0; z-index:9; background:var(--bg); display:flex; align-items:center; gap:5px; padding:0 6px; border-right:1px solid var(--border); border-left:3px solid ${bColor};`;
    labelEl.innerHTML = `
      <img src="Images/Builders/Builder ${b.builderNum}.png" style="width:22px;height:22px;object-fit:contain" onerror="this.style.display='none'" alt="">
      <div style="font-size:10px;font-weight:800;color:${bColor};line-height:1.2">B${b.builderNum}</div>`;
    row.appendChild(labelEl);

    const cell = document.createElement('div');
    cell.style.cssText = `position:relative; flex:1; height:${RH}px; overflow:hidden;`;

    days.forEach((d, i) => {
      const isMonth = i > 0 && d.getDate() === 1;
      const dl = document.createElement('div');
      dl.style.cssText = `position:absolute; top:0; bottom:0; left:${i*PX}px; width:${isMonth?2:1}px; background:${i===0?'rgba(245,208,76,0.18)':isMonth?'rgba(255,255,255,0.13)':'var(--border)'};`;
      cell.appendChild(dl);
    });

    b.upgrades.forEach((upg, idx) => {
      const startD = upg._startDate, endD = upg._endDate;
      if (!startD||!endD) return;
      const clampS = Math.max(startD.getTime(), todayStart.getTime());
      const clampE = Math.min(endD.getTime(), rangeEnd.getTime());
      if (clampS >= clampE) return;

      const leftPx  = daysBetween(todayStart, new Date(clampS)) * PX;
      const widthPx = Math.max(daysBetween(new Date(clampS), new Date(clampE)) * PX, 6);
      const isEven  = idx % 2 === 0;
      const barCol  = isEven ? bColor : hexAlpha(bColor, 0.58);
      const bordCol = upg._isCurrent ? '#fff' : isEven ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.18)';

      const bar = document.createElement('div');
      bar.className = 'gantt-bar';
      bar.style.cssText = `left:${leftPx}px; width:${widthPx}px; top:${BT}px; height:${BH}px; background:${barCol}; border-color:${bordCol};`;

      if (upg._isCurrent) {
        const badge = document.createElement('div');
        badge.className = 'bar-active-badge';
        badge.textContent = (upg._startDate && upg._startDate.getTime() < todayStart.getTime())
          ? `▶ since ${fmtDay(upg._startDate)}`
          : '▶ NOW';
        bar.appendChild(badge);
      }

      const inner = document.createElement('div');
      inner.className = 'bar-inner';
      inner.style.left = LW + 'px';

      const isSC2 = upg.upgrade && upg.upgrade.includes('*');
      const imgEl = document.createElement('img');
      imgEl.className = 'bar-icon';
      imgEl.style.cssText = `width:${Math.min(BH, widthPx - 4)}px; height:${BH}px; max-width:${BH}px;${isSC2 ? ' filter:drop-shadow(0 0 5px rgba(9,61,186,0.85));' : ''}`;
      imgEl.src = isSC2 ? getSuperchargeImage(upg.upgrade) : getUpgradeImage(upg.upgrade);
      imgEl.onerror = () => imgEl.src = 'Images/Upgrades/PH.png';
      if (isSC2) {
        const scWrap = document.createElement('div');
        scWrap.style.cssText = 'position:relative;display:inline-flex;flex-shrink:0;';
        const scOverlay = document.createElement('div');
        scOverlay.style.cssText = 'position:absolute;inset:0;background:rgba(9,61,186,0.10);border-radius:5px;pointer-events:none;';
        scWrap.appendChild(imgEl);
        scWrap.appendChild(scOverlay);
        inner.appendChild(scWrap);
      } else {
        inner.appendChild(imgEl);
      }

      if (widthPx > 180) {
        const textCol = document.createElement('div');
        textCol.className = 'bar-text-col';
        textCol.innerHTML = `<div class="bar-name" style="font-size:10px">${formatUpgradeName(upg.upgrade)}</div>`;
        inner.appendChild(textCol);
      }
      bar.appendChild(inner);

      if (widthPx > 60) {
        const endBadge = document.createElement('div');
        endBadge.className = 'bar-end-badge';
        endBadge.style.fontSize = '7px';
        endBadge.innerHTML = fmtShortHTML(endD);
        bar.appendChild(endBadge);
      }

      const boosts = getBoosts(b.builderNum, startD, endD);
      /* Drag handling */
      bar.dataset.upgUid    = upg._uid || '';
      bar.dataset.draggable = (upg._isCurrent || upg._synthetic) ? '0' : '1';
      if (!upg._isCurrent && !upg._synthetic && upg._uid) {
        bar.style.cursor = 'grab';
        bar.addEventListener('mousedown',  e => { if (e.button !== 0) return; e.stopPropagation(); startDrag(e, b.builderNum, upg, bar); });
        bar.addEventListener('touchstart', e => { if (dragModeEnabled) { e.stopPropagation(); startDrag(e, b.builderNum, upg, bar); } }, { passive: true });
      }
      bar.addEventListener('click', e => { e.stopPropagation(); showSheet(upg, b.builderNum, boosts, startD, endD); });
      /* Violation highlighting */
      if (_violations.violatingUids.has(upg._uid)) bar.classList.add('violation-bar');
      if (_violations.blockerUids.has(upg._uid))   bar.classList.add('blocker-bar');
      cell.appendChild(bar);
    });

    row.appendChild(cell);
    canvas.appendChild(row);
  });

  /* Vertical "now" line */
  const nowLineH = document.createElement('div');
  nowLineH.style.cssText = `position:absolute; top:0; bottom:0; left:${LW + nowOffsetPx}px; width:2px; background:var(--gold); opacity:0.55; z-index:11; pointer-events:none;`;
  canvas.appendChild(nowLineH);

  wrapper.appendChild(canvas);
  updateSaveBtnViolation();

  requestAnimationFrame(() => {
    _minScrollMobileH = nowOffsetPx;
    if (_preserveScrollMobile !== null) {
      wrapper.scrollLeft = Math.max(_preserveScrollMobile, _minScrollMobileH);
      _preserveScrollMobile = null;
    } else {
      wrapper.scrollLeft = _minScrollMobileH;
    }
  });
}

/* ── TOOLTIP (desktop) ── */
const tooltip = document.getElementById('ganttTooltip');
function showTooltip(e, upg, bNum, boosts, startD, endD) {
  const isSim = hasPendingChanges && !upg._isCurrent && !upg._synthetic;
  const isViol    = _violations.violatingUids.has(upg._uid);
  const isBlocker = _violations.blockerUids.has(upg._uid);
  let html = `<div class="tt-name">${upg._isCurrent?'▶ ACTIVE &nbsp;':''}${upg.upgrade||''}</div>`;
  if (isViol)    html += `<div style="font-size:9px;font-weight:700;color:#ff6b6b;background:rgba(255,70,70,0.14);border-radius:4px;padding:3px 7px;margin-bottom:6px;border:1px solid rgba(255,100,100,0.3)">⚠️ Level violation — previous level hasn't finished yet</div>`;
  if (isBlocker) html += `<div style="font-size:9px;font-weight:700;color:#ff6b6b;background:rgba(255,70,70,0.14);border-radius:4px;padding:3px 7px;margin-bottom:6px;border:1px solid rgba(255,100,100,0.3)">🚫 Blocking a higher-level upgrade</div>`;
  if (isSim) html += `<div style="font-size:9px;font-weight:700;color:var(--gold);background:rgba(245,208,76,0.12);border-radius:4px;padding:3px 6px;margin-bottom:6px;">📊 Simulated — not saved yet</div>`;
  html += `<div class="tt-row"><span class="tt-label">Start</span><span class="tt-value">${fmtDate(startD)}${isSim?' <span style="color:var(--gold);font-size:9px">~</span>':''}</span></div>`;
  html += `<div class="tt-row"><span class="tt-label">End</span><span class="tt-value">${fmtDate(endD)}${isSim?' <span style="color:var(--gold);font-size:9px">~</span>':''}</span></div>`;
  html += `<div class="tt-row"><span class="tt-label">Duration</span><span class="tt-value">${upg.duration||'—'}</span></div>`;
  if (boosts.length) {
    html += `<div class="tt-boost">⚡ ${boosts.length} boost${boosts.length>1?'s':''}</div>`;
    boosts.forEach(b => { html += `<div class="tt-boost-row">• ${fmtDate(b.date)} → ${b.newFinish}</div>`; });
  }
  tooltip.innerHTML = html;
  tooltip.classList.add('visible');
  moveTooltip(e);
}
function moveTooltip(e) {
  const vw=window.innerWidth, vh=window.innerHeight, tw=295, th=190;
  let x=e.clientX+16, y=e.clientY+16;
  if (x+tw>vw) x=e.clientX-tw-8;
  if (y+th>vh) y=e.clientY-th-8;
  tooltip.style.left=x+'px'; tooltip.style.top=y+'px';
}
function hideTooltip() { tooltip.classList.remove('visible'); }
document.addEventListener('click', e => { if (!e.target.closest('.gantt-bar')) hideTooltip(); });

/* ── BOTTOM SHEET (mobile) ── */
function showSheet(upg, bNum, boosts, startD, endD) {
  document.querySelector('.mobile-sheet')?.remove();
  const s = document.createElement('div');
  s.className = 'mobile-sheet';
  const isSim = hasPendingChanges && !upg._isCurrent && !upg._synthetic;
  const simBadge = isSim
    ? `<div style="margin-bottom:10px;padding:4px 8px;background:rgba(245,208,76,0.14);border-radius:6px;font-size:10px;color:var(--gold);font-weight:700;border:1px solid rgba(245,208,76,0.3);">📊 Simulated order — not saved yet</div>`
    : '';
  const simTilde = isSim ? ' <span style="color:var(--gold);font-size:9px;font-weight:700">~</span>' : '';
  let bHtml = '';
  if (boosts.length) {
    bHtml = `<div class="sheet-boost">⚡ ${boosts.length} boost${boosts.length>1?'s':''}</div>`;
    boosts.forEach(b => { bHtml += `<div style="font-size:10px;color:#ccc;margin-top:4px">• ${fmtDate(b.date)} → ${b.newFinish}</div>`; });
  }
  s.innerHTML = `
    <div class="sheet-handle"></div>
    <div class="sheet-title">${upg._isCurrent?'▶ ':''}${upg.upgrade||''}</div>
    ${simBadge}
    <div class="sheet-row"><span class="sheet-label">Start</span><span class="sheet-value">${fmtDate(startD)}${simTilde}</span></div>
    <div class="sheet-row"><span class="sheet-label">End</span><span class="sheet-value">${fmtDate(endD)}${simTilde}</span></div>
    <div class="sheet-row"><span class="sheet-label">Duration</span><span class="sheet-value">${upg.duration||'—'}</span></div>
    ${bHtml}`;
  document.body.appendChild(s);
  setTimeout(()=>document.addEventListener('click',()=>document.querySelector('.mobile-sheet')?.remove(),{once:true}),100);
}
