    });

    // Search button
    document.getElementById('searchBtn').addEventListener('click', openSearch);
    document.getElementById('searchClose').addEventListener('click', closeSearch);
    document.getElementById('searchModal').addEventListener('click', e => {
      if (e.target === document.getElementById('searchModal')) closeSearch();
    });

    // Search input
    document.getElementById('bldgSearchInput').addEventListener('input', e => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => performSearch(e.target.value), 250);
    });

    // Search result click
    document.getElementById('bldgSearchResults').addEventListener('click', e => {
      const btn = e.target.closest('.bsr-open-btn');
      if (!btn) return;
      const idx     = parseInt(btn.dataset.resultIdx);
      const matches = document.getElementById('bldgSearchResults')._matches;
      if (!matches || !matches[idx]) return;
      closeSearch();
      openDetail(matches[idx]);
    });

    // Refresh
    document.getElementById('refreshBtn').addEventListener('click', async () => {
      const btn = document.getElementById('refreshBtn');
      btn.classList.add('loading'); btn.textContent = '…';
      if (activeTab === 'progress') {
        progressLoaded = false;
        await loadProgress();
      } else if (activeTab === 'unassigned') {
        unassignedLoaded = false;
        await loadBuildings();
        await loadUnassigned();
      } else {
        await loadBuildings();
      }
      btn.classList.remove('loading'); btn.textContent = '⟳ Refresh';
    });

    // ESC to close modals
    document.addEventListener('keydown', e => {
      if (e.key !== 'Escape') return;
      if (document.getElementById('detailModal').style.display !== 'none') { closeDetail(); return; }
      if (document.getElementById('searchModal').style.display !== 'none') { closeSearch(); return; }
    });

    /* ── TH PROGRESS ── */
    let progressLoaded = false;

    async function loadProgress() {
      const pg = document.getElementById('progressGrid');
      let thLevel = parseInt(localStorage.getItem('coc_th_level') || '0');

      // Not cached yet — try fetching from backend (reads Registrations sheet)
      if (!thLevel) {
        pg.innerHTML = `<div class="bldg-status"><div class="bldg-spinner"></div><span>Looking up your TH level…</span></div>`;
        pg.style.display = '';
        try {
          const res  = await fetch(endpoint('get_town_hall_level'));
          const data = await res.json();
          if (data.th_level) {
            thLevel = parseInt(data.th_level);
            localStorage.setItem('coc_th_level', String(thLevel));
            if (data.tag) localStorage.setItem('coc_tag', data.tag);
          }
        } catch { /* fall through to error below */ }
      }

      if (!thLevel) {
        pg.innerHTML = `<div class="prog-no-th">
          <span>Town Hall level not found.</span>
          <span>Log out and log back in to sync your TH level.</span>
        </div>`;
        pg.style.display = '';
        return;
      }

      // Show spinner while loading
      pg.innerHTML = `<div class="bldg-status"><div class="bldg-spinner"></div><span>Loading TH${thLevel} data…</span></div>`;
      pg.style.display = '';

      // Try to fetch current village building levels from backend
      // Grouped by buildingId: { "1000009": [12, 10, 8], ... } (sorted desc)
      let villageLevels = {};
      try {
        const res  = await fetch(endpoint('get_village_buildings'));
        const data = await res.json();
        if (data.buildings) villageLevels = data.buildings;
      } catch { /* graceful — show reference list without current levels */ }

      // Hero levels are not in get_village_buildings. Infer from the builder queue:
      // the lowest queued upgrade level for a hero minus 1 = its current level.
      for (const u of allUpgrades) {
        if (u.typeB !== '7') continue;
        const info = parseBuildingInfo(u.upgrade || '');
        if (!info || info.isSC || info.level === null) continue;
        const heroEntry = Object.entries(HERO_GAME_DATA).find(([name]) => name === info.base);
        if (!heroEntry) continue;
        const heroId  = String(heroEntry[1].heroId);
        const curInferred = info.level - 1;
        // Keep the lowest inferred value (closest next upgrade = truest current level)
        if (!villageLevels[heroId] || curInferred < villageLevels[heroId][0]) {
          villageLevels[heroId] = [curInferred];
        }
      }

      const defenses      = getDefensesAtTH(thLevel);
      const resources     = getResourcesAtTH(thLevel);
      const army          = getArmyAtTH(thLevel);
      const traps         = getTrapsAtTH(thLevel);
      const heroHallLevel = villageLevels['1000071']?.[0] ?? null;
      const heroes        = getHeroesForProgress(heroHallLevel);
      renderProgressGrid(pg, defenses, resources, army, traps, heroes, villageLevels, thLevel, heroHallLevel);
      progressLoaded = true;
    }

    function renderProgressGrid(pg, defenses, resources, army, traps, heroes, villageLevels, thLevel, heroHallLevel) {
      if (defenses.length === 0 && resources.length === 0 && army.length === 0 && traps.length === 0 && heroes.length === 0) {
        pg.innerHTML = `<div class="prog-no-th"><span>No data found for TH${thLevel}.</span></div>`;
        pg.style.display = '';
        return;
      }

      const hasVillageData = Object.keys(villageLevels).length > 0;
      const startExpanded  = localStorage.getItem('coc_prog_keep_expanded') === 'true';

      // ── Build a standard building card, or a compact one if fully maxed ──
      function buildBuildingCard(bldg) {
        const imgSrc       = getUpgradeImage(`${bldg.name} Lvl ${bldg.maxLevel}`) || 'Images/Upgrades/PH.png';
        const currentLevels = bldg.buildingId ? (villageLevels[String(bldg.buildingId)] || []) : [];
        const instLevels   = Array.from({ length: bldg.count }, (_, i) => currentLevels[i] ?? null);
        const knownCount   = instLevels.filter(l => l !== null).length;
        const maxedCount   = instLevels.filter(l => l !== null && l >= bldg.maxLevel).length;
        const allMaxed     = knownCount > 0 && maxedCount === bldg.count;

        if (allMaxed) {
          const countTag = bldg.count > 1 ? `<span class="prog-compact-count">×${bldg.count}</span>` : '';
          return `
            <div class="prog-card prog-card--maxed prog-card--compact">
              <div class="prog-compact-inner">
                <img src="${esc(imgSrc)}" class="prog-compact-img" onerror="this.src='Images/Upgrades/PH.png'" alt="">
                <div class="prog-compact-info">
                  <span class="prog-compact-name">${esc(bldg.name)}</span>
                  ${countTag}
                </div>
                <span class="prog-max-badge">MAX</span>
              </div>
            </div>`;
        }

        let badgeClass, badgeText;
        if      (knownCount === 0)      { badgeClass = 'unknown'; badgeText = '?'; }
        else if (bldg.count === 1)      { badgeClass = 'partial'; badgeText = `${Math.round((instLevels[0] / bldg.maxLevel) * 100)}%`; }
        else                            { badgeClass = maxedCount > 0 ? 'partial' : 'unknown'; badgeText = `${maxedCount}/${bldg.count}`; }

        const instanceRows = instLevels.map((curLvl, i) => {
          const isMaxed   = curLvl !== null && curLvl >= bldg.maxLevel;
          const isUnknown = curLvl === null;
          const pct       = isUnknown ? 0 : Math.min(100, Math.round((curLvl / bldg.maxLevel) * 100));
          const fillClass = isUnknown ? 'unknown' : isMaxed ? 'maxed' : '';
          const valClass  = isUnknown ? 'unknown' : isMaxed ? 'maxed' : '';
          const valText   = isUnknown ? `? / ${bldg.maxLevel}` : `${curLvl} / ${bldg.maxLevel}`;
          const labelHtml = bldg.count > 1 ? `<span class="prog-inst-label">${i + 1}</span>` : '';
          const barAttrs  = !isMaxed ? `data-prog-bldg="${esc(bldg.name)}" data-prog-inst="${i}" data-prog-lvl="${curLvl ?? ''}" data-prog-max="${bldg.maxLevel}"` : '';
          return `
            <div class="prog-instance-row">
              ${labelHtml}
              <div class="prog-bar-wrap" ${barAttrs}><div class="prog-bar-fill ${fillClass}" style="width:${pct}%"></div></div>
              <span class="prog-inst-val ${valClass}">${valText}</span>
            </div>`;
        }).join('');

        const noJsonNote = !hasVillageData
          ? `<div class="prog-no-json">Register with village JSON to see current levels</div>` : '';

        return `
          <div class="prog-card">
            <div class="prog-card-header">
              <img src="${esc(imgSrc)}" class="prog-card-img" onerror="this.src='Images/Upgrades/PH.png'" alt="">
              <div class="prog-card-info"><div class="prog-card-name">${esc(bldg.name)}</div></div>
            </div>
            <div class="prog-card-body">${instanceRows}${noJsonNote}</div>
          </div>`;
      }

      // ── Build a hero card, or compact if maxed ──
      function buildHeroCard(hero) {
        const imgSrc    = getUpgradeImage(hero.name);
        const curLvl    = (villageLevels[String(hero.heroId)] || [])[0] ?? null;
        const isMaxed   = curLvl !== null && curLvl >= hero.maxLevel;
        const isUnknown = curLvl === null;

        if (isMaxed) {
          return `
            <div class="prog-card prog-card--maxed prog-card--compact">
              <div class="prog-compact-inner">
                <img src="${esc(imgSrc)}" class="prog-compact-img" onerror="this.src='Images/Upgrades/PH.png'" alt="">
                <div class="prog-compact-info"><span class="prog-compact-name">${esc(hero.name)}</span></div>
                <span class="prog-max-badge">MAX</span>
              </div>
            </div>`;
        }

        const pct       = isUnknown ? 0 : Math.min(100, Math.round((curLvl / hero.maxLevel) * 100));
        const fillClass = isUnknown ? 'unknown' : '';
        const valClass  = isUnknown ? 'unknown' : '';
        const valText   = isUnknown ? `? / ${hero.maxLevel}` : `${curLvl} / ${hero.maxLevel}`;
        const badgeClass = isUnknown ? 'unknown' : 'partial';
        const badgeText  = isUnknown ? '?' : `${pct}%`;
        const noJsonNote = !hasVillageData
          ? `<div class="prog-no-json">Register with village JSON to see current level</div>` : '';

        return `
          <div class="prog-card">
            <div class="prog-card-header">
              <img src="${esc(imgSrc)}" class="prog-card-img" onerror="this.src='Images/Upgrades/PH.png'" alt="">
              <div class="prog-card-info"><div class="prog-card-name">${esc(hero.name)}</div></div>
            </div>
            <div class="prog-card-body">
              <div class="prog-instance-row">
                <div class="prog-bar-wrap" data-prog-bldg="${esc(hero.name)}" data-prog-inst="0" data-prog-lvl="${isUnknown ? '' : curLvl}" data-prog-max="${hero.maxLevel}"><div class="prog-bar-fill ${fillClass}" style="width:${pct}%"></div></div>
                <span class="prog-inst-val ${valClass}">${valText}</span>
              </div>
              ${noJsonNote}
            </div>
          </div>`;
      }

      // ── Wrap cards in a collapsible section ──
      function buildSection(title, cardsHtml) {
        if (!cardsHtml) return '';
        const openClass = startExpanded ? ' open' : '';
        return `
          <div class="prog-section${openClass}">
            <div class="prog-section-header">
              <span class="prog-section-title">${title}</span>
              <svg class="prog-section-arrow" width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M4.5 6.75 9 11.25l4.5-4.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="prog-section-body">
              <div class="prog-grid">${cardsHtml}</div>
            </div>
          </div>`;
      }

      // ── Sort helpers: maxed items go to the end ──
      function bldgAllMaxed(bldg) {
        const lvls = bldg.buildingId ? (villageLevels[String(bldg.buildingId)] || []) : [];
        const inst = Array.from({ length: bldg.count }, (_, i) => lvls[i] ?? null);
        return inst.filter(l => l !== null).length > 0 &&
               inst.filter(l => l !== null && l >= bldg.maxLevel).length === bldg.count;
      }
      function heroMaxed(hero) {
        const lvl = (villageLevels[String(hero.heroId)] || [])[0] ?? null;
        return lvl !== null && lvl >= hero.maxLevel;
      }
      function sortMaxedLast(arr, fn) {
        return [...arr].sort((a, b) => (fn(a) ? 1 : 0) - (fn(b) ? 1 : 0));
      }

      pg.innerHTML = `
        <div class="prog-controls">
          <label class="prog-expand-toggle">
            <input type="checkbox" id="progKeepExpanded" ${startExpanded ? 'checked' : ''}>
            Keep expanded
          </label>
        </div>
        ${buildSection('Defenses',  sortMaxedLast(defenses,  bldgAllMaxed).map(buildBuildingCard).join(''))}
        ${buildSection('Resources', sortMaxedLast(resources, bldgAllMaxed).map(buildBuildingCard).join(''))}
        ${buildSection('Army',      sortMaxedLast(army,      bldgAllMaxed).map(buildBuildingCard).join(''))}
        ${buildSection('Traps',     sortMaxedLast(traps,     bldgAllMaxed).map(buildBuildingCard).join(''))}
        ${buildSection('Heroes',    sortMaxedLast(heroes,    heroMaxed).map(buildHeroCard).join(''))}`;
      pg.style.display = '';

      pg.querySelectorAll('.prog-section-header').forEach(header => {
        header.addEventListener('click', () => header.closest('.prog-section').classList.toggle('open'));
      });

      pg.querySelector('#progKeepExpanded')?.addEventListener('change', e => {
        localStorage.setItem('coc_prog_keep_expanded', e.target.checked);
        if (e.target.checked) pg.querySelectorAll('.prog-section').forEach(s => s.classList.add('open'));
      });

      // ── Progress bar click → schedule sheet (delegated, added once) ──
      if (!pg.dataset.hasProgListener) {
        pg.dataset.hasProgListener = '1';
        pg.addEventListener('click', e => {
          const bar = e.target.closest('.prog-bar-wrap[data-prog-bldg]');
          if (!bar) return;
          e.stopPropagation();
          const bldgName = bar.dataset.progBldg;
          const instIdx  = parseInt(bar.dataset.progInst  ?? '0');
          const curLvl   = bar.dataset.progLvl !== '' ? parseInt(bar.dataset.progLvl) : null;
          const maxLevel = parseInt(bar.dataset.progMax   ?? '0');
          showProgressSheet(bldgName, instIdx, curLvl, maxLevel);
        });
      }
    }

    /* ── PROGRESS SCHEDULE SHEET ── */

    // Renders an upgrade name, replacing Lvl * sequences with SC icons
    function renderUpgradeName(name) {
      if (!name) return '—';
      return esc(name).replace(/Lvl\s+(\*+)/gi, (_, stars) =>
        `Lvl ${stars.split('').map(() =>
          `<img src="Images/SCicon.png" style="height:1em;vertical-align:middle;margin:0 1px;" alt="SC">`
        ).join('')}`
      );
    }

    function showProgressSheet(bldgName, instIdx, curLvl, maxLevel) {
      document.querySelector('.prog-sched-sheet')?.remove();

      const allForBldg  = allUpgrades.filter(u => {
        const info = parseBuildingInfo(u.upgrade || '');
        return info && info.base === bldgName;
      });
      const hasInstNums = allForBldg.some(u => parseBuildingInfo(u.upgrade || '')?.instance !== null);

      // Narrow queued upgrades to this specific instance
      let matches = allForBldg;
      if (hasInstNums) {
        const specific = allForBldg.filter(u =>
          parseBuildingInfo(u.upgrade || '')?.instance === String(instIdx + 1)
        );
        if (specific.length > 0) matches = specific;
      }

      // Find any currently active upgrade for this building/instance
      const actives = Object.entries(currentWorkMap)
        .filter(([, work]) => {
          const info = parseBuildingInfo(work.upgrade || '');
          if (!info || info.base !== bldgName) return false;
          if (hasInstNums && info.instance !== null) return info.instance === String(instIdx + 1);
          return true;
        })
        .map(([bNum, work]) => ({ ...work, builderNum: parseInt(bNum) }));

      const instLabel = hasInstNums ? ` #${instIdx + 1}` : '';
      const lvlText   = curLvl !== null && curLvl !== undefined ? `Lvl ${curLvl}` : '?';

      // ── Active block ──
      const activeHtml = actives.map(a => `
        <div class="prog-sheet-active-block">
          <div class="prog-sheet-active-badge">▶ UPGRADING NOW</div>
          <div class="prog-sheet-row">
            <span class="prog-sheet-label">Upgrade</span>
            <span class="prog-sheet-value prog-sheet-value--upgrade">${renderUpgradeName(a.upgrade)}</span>
          </div>
          <div class="prog-sheet-row">
            <span class="prog-sheet-label">Builder</span>
            <span class="prog-sheet-value prog-sheet-value--builder" data-b="${a.builderNum}">B${a.builderNum}</span>
          </div>
          <div class="prog-sheet-row">
            <span class="prog-sheet-label">Finishes</span>
            <span class="prog-sheet-value prog-sheet-value--time">${esc(a.finishTimeStr || '—')}</span>
          </div>
        </div>`).join('');

      // ── Queued block ──
      const queuedHtml = [...matches]
        .sort((a, b) => a.queueIdx - b.queueIdx)
        .map((u, idx) => `
          ${idx > 0 || actives.length > 0 ? '<hr class="prog-sheet-divider">' : ''}
          <div class="prog-sheet-row">
            <span class="prog-sheet-label">Upgrade</span>
            <span class="prog-sheet-value prog-sheet-value--upgrade">${renderUpgradeName(u.upgrade)}</span>
          </div>
          <div class="prog-sheet-row">
            <span class="prog-sheet-label">Builder</span>
            <span class="prog-sheet-value prog-sheet-value--builder" data-b="${u.builderNum}">B${u.builderNum}</span>
          </div>
          <div class="prog-sheet-row">
            <span class="prog-sheet-label">Starts</span>
            <span class="prog-sheet-value prog-sheet-value--time">${esc(u.start || '—')}</span>
          </div>
          <div class="prog-sheet-row">
            <span class="prog-sheet-label">Ends</span>
            <span class="prog-sheet-value prog-sheet-value--time">${esc(u.end || '—')}</span>
          </div>
          <div class="prog-sheet-row">
            <span class="prog-sheet-label">Duration</span>
            <span class="prog-sheet-value prog-sheet-value--duration">${esc(fmtDurationMin(u.durationMinutes) || u.duration || '—')}</span>
          </div>`).join('');

      const bodyHtml = activeHtml || queuedHtml
        ? activeHtml + queuedHtml
        : `<div class="prog-sheet-none">Not currently scheduled</div>`;

      const s = document.createElement('div');
      s.className = 'prog-sched-sheet';
      s.innerHTML = `
        <div class="prog-sheet-handle"></div>
        <div class="prog-sheet-title">${esc(bldgName)}${esc(instLabel)} · ${esc(lvlText)} / ${maxLevel || '?'}</div>
        ${bodyHtml}`;
      document.body.appendChild(s);
      setTimeout(() => document.addEventListener('click', () => document.querySelector('.prog-sched-sheet')?.remove(), { once: true }), 100);
    }

    /* ── GAMEDATA LOOKUP (for unassigned tab) ── */

    /**
     * Given a base building name and numeric level, search all gamedata
     * objects and return { duration_min, cost, resource } or null.
     */
    function lookupUpgradeInGamedata(baseName, level) {
      const sources = [
        DEFENSE_GAME_DATA,
        RESOURCE_GAME_DATA,
        ARMY_GAME_DATA,
        TRAP_GAME_DATA,
        HERO_GAME_DATA,
      ];
      for (const src of sources) {
        const entry = src[baseName];
        if (!entry) continue;
        const lvlData = entry.levels?.find(l => l.level === level);
        if (lvlData) return { duration_min: lvlData.duration_min, cost: lvlData.cost, resource: entry.resource };
      }
      return null;
    }

    /**
     * Format minutes into a compact duration string.
     * Rules (match user examples):
     *   8h 0m  → "8h"       (trailing 0m dropped when h > 0)
     *   10d 12h 0m → "10d 12h" (same, trailing 0m dropped when h > 0)
     *   7d 0h 0m   → "7d 0h 0m" (hours = 0, keep all three parts)
     *   8h 30m → "8h 30m"   (non-zero minutes always shown)
     */
    function fmtDurationMin(minutes) {
      if (!minutes && minutes !== 0) return '—';
      minutes = Math.round(minutes);
      const d = Math.floor(minutes / 1440);
      const h = Math.floor((minutes % 1440) / 60);
      const m = minutes % 60;
      if (d > 0) {
        if (h === 0 && m === 0) return `${d}d`;
        if (m === 0) return `${d}d ${h}h`;
        return `${d}d ${h}h ${m}m`;
      }
      if (h > 0) return m > 0 ? `${h}h ${m}m` : `${h}h`;
      return `${m}m`;
    }

    function fmtCost(cost, resource) {
      if (!cost && cost !== 0) return '—';
      let n;
      if (cost >= 1000000) n = `${(cost / 1000000).toFixed(cost % 1000000 === 0 ? 0 : 1)}M`;
      else if (cost >= 1000) n = `${(cost / 1000).toFixed(0)}K`;
      else n = String(cost);
      const icons = { gold: 'Gold', de: 'Dark Elixir', elixir: 'Elixir', gems: 'Gems' };
      return `${n} ${icons[resource] || resource || ''}`.trim();
    }

    /** Number-only cost string (resource label shown separately in the card). */
    function fmtCostNum(cost) {
      if (!cost && cost !== 0) return '—';
      if (cost >= 1000000) return `${(cost / 1000000).toFixed(cost % 1000000 === 0 ? 0 : 1)}M`;
      if (cost >= 1000)    return `${(cost / 1000).toFixed(0)}K`;
      return String(cost);
    }

    /* ── UNASSIGNED UPGRADES ── */
    let unassignedLoaded = false;

    async function loadUnassigned() {
      const grid = document.getElementById('unassignedGrid');

      let upgrades = [];
      if (unassignedLoaded) {
        upgrades = unassignedUpgrades;
      } else {
        grid.innerHTML = `<div class="bldg-status"><div class="bldg-spinner"></div><span>Loading unassigned upgrades…</span></div>`;
        grid.style.display = '';
        try {
          const res  = await fetch(endpoint('get_unassigned_upgrades'));
          const data = await res.json();
          upgrades = data.upgrades || [];
          unassignedUpgrades = upgrades;
          // Sync into allUpgrades so search/tabs stay accurate
          allUpgrades = allUpgrades.filter(u => !u.isUnassigned);
          upgrades.forEach(u => {
            const info  = parseBuildingInfo(u.upgradeName || '');
            const typeB = info ? getBuildingTypeBFrontend(info.base) : null;
            allUpgrades.push({
              upgrade: u.upgradeName,
              builderNum: 'UA',
              queueIdx: -1,
              typeB: typeB ? String(typeB) : null,
              durationMinutes: u.durationMinutes,
              isUnassigned: true
            });
          });
          unassignedLoaded = true;
        } catch (err) {
          grid.innerHTML = `<div class="unassigned-empty"><div class="unassigned-empty-icon">⚠️</div><span>Failed to load: ${esc(err.message)}</span></div>`;
          return;
        }
      }

      if (upgrades.length === 0) {
        grid.innerHTML = `<div class="unassigned-empty"><div class="unassigned-empty-icon">📋</div><span>No unassigned upgrades</span><span style="font-size:12px">Add upgrades to A34:B in your CURRENT_WORK sheet to see them here</span></div>`;
        return;
      }

      const cards = upgrades.map(u => {
        const info    = parseBuildingInfo(u.upgradeName || '');
        const gd      = info ? lookupUpgradeInGamedata(info.base, info.level) : null;
        const isSC    = u.upgradeName?.includes('*');
        const imgSrc  = isSC ? getSuperchargeImage(u.upgradeName) : getUpgradeImage(u.upgradeName || '');
        const catId   = getBuildingTypeBFrontend(info?.base);
        const catName = catId ? (CATEGORIES[catId] || '') : '';

        // Duration: prefer gamedata, fall back to sheet column B
        const durMin = (gd && gd.duration_min != null) ? gd.duration_min : u.durationMinutes;
        const durFmt = fmtDurationMin(durMin);
        const showDur = durFmt && durFmt !== '—';

        // Cost + resource for colour
        const resource  = gd?.resource || 'unknown';
        const resClass  = { gold: 'res-gold', elixir: 'res-elixir', de: 'res-de', gems: 'res-gems' }[resource] || 'res-unknown';
        const costFmt   = gd && gd.cost != null ? fmtCostNum(gd.cost) : '—';
        const showCost  = costFmt && costFmt !== '—';
        const resIconMap = { gold: 'Images/Gold.png', elixir: 'Images/Elixir.png', de: 'Images/Dark Elixir.png' };
        const resIcon    = resIconMap[resource] || '';

        const durRow  = showDur  ? `<div class="unassigned-dur-row"><img src="Images/Clock vector.png" class="unassigned-clock-icon" alt=""><span class="unassigned-dur">${esc(durFmt)}</span></div>` : '';
        const costRow = showCost ? `<div class="unassigned-cost-row">${resIcon ? `<img src="${resIcon}" class="unassigned-res-icon" alt="">` : ''}<span class="unassigned-cost ${resClass}">${esc(costFmt)}</span></div>` : '';

        return `
          <div class="unassigned-card">
            <img src="${esc(imgSrc)}" class="unassigned-img" onerror="this.src='Images/Upgrades/PH.png'" alt="">
            <div class="unassigned-name">${formatName(esc(u.upgradeName || ''))}</div>
            ${catName ? `<div class="unassigned-badges"><span class="unassigned-cat-badge">${esc(catName)}</span></div>` : ''}
            ${(showDur || showCost) ? `<div class="unassigned-divider"></div><div class="unassigned-info-row">${durRow}${costRow}</div>` : ''}
          </div>`;
      }).join('');

      grid.innerHTML = `
        <div class="unassigned-header">
          <span class="unassigned-x-icon">✕</span>
          <span class="unassigned-title">Unassigned Upgrades</span>
          <span class="unassigned-count">${upgrades.length}</span>
        </div>
        <div class="unassigned-grid">${cards}</div>`;
      grid.style.display = '';
      unassignedLoaded = true;
    }

    /**
     * Frontend mirror of getBuildingTypeB_ from info.gs — derives category ID from base name.
     */
    function getBuildingTypeBFrontend(baseName) {
      if (!baseName) return null;
      const BCAT = {
        "Cannon":"1","Archer Tower":"1","Mortar":"1","Air Defense":"1","Hidden Tesla":"1",
        "X-Bow":"1","Inferno Tower":"1","Eagle Artillery":"1","Scattershot":"1","Monolith":"1",
        "Wizard Tower":"1","Bomb Tower":"1","Firespitter":"1","Builder Hut":"1",
        "Multi-Archer Tower":"1","Multi-Gear Tower":"1","Town Hall":"1","Giga Tesla":"1",
        "Giga Bomb":"1","Super Wizard Tower":"1","Revenge Tower":"1","Ricochet Cannon":"1","Spell Tower":"1",
        "Gold Mine":"2","Elixir Collector":"2","Dark Elixir Drill":"2",
        "Gold Storage":"2","Elixir Storage":"2","Dark Elixir Storage":"2",
        "Spring Trap":"4","Giant Bomb":"4","Air Bomb":"4","Seeking Air Mine":"4","Skeleton Trap":"4","Bomb":"4",
        "Longshot":"6",
        "Barbarian King":"7","Archer Queen":"7","Grand Warden":"7","Royal Champion":"7",
        "Minion Prince":"7","Dragon Duke":"7","Hero Hall":"7",
        "Laboratory":"8","Workshop":"8","Pet House":"8","Clan Castle":"8",
        "Blacksmith":"8","Army Camp":"8","Barracks":"8","Spell Factory":"8",
      };
      if (/\s(?:DHP|CP|HP)$/.test(baseName)) return "3";
      return BCAT[baseName] || null;
    }

    /* ── INIT ── */
    document.addEventListener('DOMContentLoaded', () => {
      window.COC_TOKEN = localStorage.getItem('coc_token') || '';
      const username = localStorage.getItem('coc_username');
      if (!username) { window.location.href = 'index.html'; return; }
      window.COC_USERNAME = username;
      loadBuildings();
      setupPullToRefresh(loadBuildings);
    });

    function setupPullToRefresh(onRefresh) {
      const THRESHOLD = 80;
      let startY = 0, dist = 0, active = false;
      const bar = document.createElement('div');
      bar.className = 'ptr-bar';
      document.body.prepend(bar);
      function onStart(y) { if (window.scrollY !== 0) return; startY = y; dist = 0; active = true; }
      function onMove(y)  { if (!active) return; dist = Math.max(0, y - startY); bar.style.setProperty('--ptr-p', Math.min(dist / THRESHOLD, 1)); bar.classList.toggle('ptr-ready', dist >= THRESHOLD); }
      async function onEnd() {
        if (!active) return; active = false;
        if (dist < THRESHOLD) { bar.style.setProperty('--ptr-p', 0); bar.classList.remove('ptr-ready'); return; }
        bar.classList.remove('ptr-ready'); bar.classList.add('ptr-loading');
        await onRefresh();
        bar.classList.remove('ptr-loading'); bar.style.setProperty('--ptr-p', 0); dist = 0;
      }
      document.addEventListener('touchstart', e => onStart(e.touches[0].clientY), { passive: true });
      document.addEventListener('touchmove',  e => onMove(e.touches[0].clientY),  { passive: true });
      document.addEventListener('touchend',   onEnd);
      document.addEventListener('mousedown', e => onStart(e.clientY));
      document.addEventListener('mousemove', e => { if (active) onMove(e.clientY); });
      document.addEventListener('mouseup',   onEnd);
    }
  </script>
</body>
</html>
