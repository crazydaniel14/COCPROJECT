<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>COC Planner — Buildings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:     #f5d04c;
      --bg:       #101013;
      --surface:  #19191e;
      --surface2: #23232b;
      --border:   rgba(255,255,255,0.08);
      --text:     #ffffff;
      --text-dim: #9999a8;
    }

    html, body { height: 100%; background: var(--bg); font-family: 'Lexend', sans-serif; color: var(--text); overflow-x: hidden; }

    /* ── HEADER ── */
    .bldg-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 200; gap: 12px;
    }
    .bldg-title { font-size: 18px; font-weight: 800; color: var(--gold); letter-spacing: .5px; white-space: nowrap; flex: 1; }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
      padding: 8px 14px; color: var(--text-dim); font-family: 'Lexend', sans-serif;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all .18s;
      white-space: nowrap; text-decoration: none;
    }
    .back-btn:hover { color: var(--text); border-color: var(--gold); }
    .header-actions { display: flex; align-items: center; gap: 8px; }
    .icon-action-btn {
      display: flex; align-items: center; justify-content: center;
      background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
      padding: 8px 10px; cursor: pointer; transition: all .18s;
    }
    .icon-action-btn:hover { border-color: var(--gold); }
    .icon-action-btn img { width: 22px; height: 22px; object-fit: contain; display: block; }
    .refresh-btn {
      display: flex; align-items: center; gap: 6px;
      background: var(--gold); border: none; border-radius: 10px;
      padding: 8px 14px; color: #000; font-family: 'Lexend', sans-serif;
      font-size: 13px; font-weight: 700; cursor: pointer; transition: all .18s; white-space: nowrap;
    }
    .refresh-btn:hover { background: #ffd700; }
    .refresh-btn.loading { opacity: .7; pointer-events: none; }

    /* ── CATEGORY TABS (bigger) ── */
    .cat-tabs {
      display: flex; gap: 10px; padding: 12px 20px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      overflow-x: auto; position: sticky; top: 57px; z-index: 190;
    }
    .cat-tabs::-webkit-scrollbar { display: none; }
    .cat-tab {
      flex-shrink: 0; padding: 8px 16px; border-radius: 12px;
      border: 1.5px solid var(--border); background: var(--surface2);
      color: var(--text-dim); font-family: 'Lexend', sans-serif;
      font-size: 13px; font-weight: 700; cursor: pointer; transition: all .18s; white-space: nowrap;
      line-height: 1; display: flex; align-items: center; gap: 7px;
    }
    .cat-tab:hover { color: var(--text); border-color: rgba(245,208,76,0.5); }
    .cat-tab.active { background: rgba(245,208,76,0.15); border-color: var(--gold); color: var(--gold); }
    .tab-icon {
      width: 20px; height: 20px; object-fit: contain; border-radius: 4px; flex-shrink: 0;
    }
    .cat-count {
      display: inline-flex; align-items: center; justify-content: center;
      background: rgba(245,208,76,0.2); color: var(--gold); border-radius: 6px;
      font-size: 11px; font-weight: 800; padding: 2px 6px; margin-left: 2px; min-width: 20px;
    }

    /* ── SORT BAR ── */
    .sort-bar {
      display: flex; align-items: center; gap: 8px; padding: 10px 20px;
      background: var(--bg); border-bottom: 1px solid var(--border);
    }
    .sort-label { font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: .5px; margin-right: 4px; white-space: nowrap; }
    .sort-btn {
      padding: 6px 14px; border-radius: 8px; border: 1.5px solid var(--border);
      background: var(--surface2); color: var(--text-dim); font-family: 'Lexend', sans-serif;
      font-size: 12px; font-weight: 700; cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .sort-btn:hover { border-color: rgba(245,208,76,0.4); color: var(--text); }
    .sort-btn.active { background: rgba(245,208,76,0.1); border-color: rgba(245,208,76,0.6); color: var(--gold); }

    /* ── MAIN CONTENT ── */
    .bldg-content { padding: 18px 20px 80px; }

    /* ── LOADING / ERROR ── */
    .bldg-status {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 60px 20px; color: var(--text-dim); font-size: 14px; font-weight: 500; gap: 12px; text-align: center;
    }
    .bldg-spinner {
      width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--gold);
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── CARD GRID ── */
    .bldg-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 14px; }

    /* ── BUILDING TYPE SECTION HEADER ── */
    .bldg-section-header {
      grid-column: 1 / -1; display: flex; align-items: center; gap: 10px;
      margin-top: 10px; padding-bottom: 4px;
    }
    .bldg-section-header.first { margin-top: 0; }
    .bldg-section-header span {
      font-size: 10px; font-weight: 800; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: .8px; white-space: nowrap;
    }
    .bldg-section-header::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* ── BUILDING GROUP CARD ── */
    .bldg-building-group {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      overflow: hidden; transition: border-color .18s;
    }
    .bldg-building-group:hover { border-color: rgba(245,208,76,0.3); }
    .bldg-building-group.has-next { border-color: rgba(245,208,76,0.45); background: rgba(245,208,76,0.03); }
    .bbg-header {
      display: flex; align-items: center; gap: 12px; padding: 14px 14px 12px;
    }
    .bbg-img { width: 56px; height: 56px; object-fit: contain; border-radius: 8px; flex-shrink: 0; }
    .bbg-info { flex: 1; min-width: 0; }
    .bbg-title { font-size: 13px; font-weight: 800; color: var(--text); line-height: 1.3; }
    .bbg-cur-level { font-size: 11px; color: var(--text-dim); font-weight: 600; margin-top: 4px; }
    .bbg-upgrades { border-top: 1px solid var(--border); }
    .bbg-upgrade-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 14px; border-bottom: 1px solid rgba(255,255,255,0.04);
      cursor: pointer; transition: background .12s; gap: 8px;
    }
    .bbg-upgrade-row:last-child { border-bottom: none; }
    .bbg-upgrade-row:hover { background: rgba(255,255,255,0.04); }
    .bbg-upgrade-row.next-row { background: rgba(245,208,76,0.05); }
    .bbg-upgrade-row.selected { background: rgba(245,208,76,0.12); }
    .bbg-lvl-label {
      font-size: 12px; font-weight: 700; color: var(--text);
      display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0;
    }
    .bbg-lvl-arrow { color: var(--gold); font-size: 12px; flex-shrink: 0; }
    .bbg-row-meta { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

    /* ── INDIVIDUAL CARD (kept for any fallback) ── */
    .bldg-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      padding: 14px 12px 12px; display: flex; flex-direction: column; align-items: center; gap: 8px;
      transition: border-color .18s, transform .12s; position: relative; cursor: pointer;
    }
    .bldg-card:hover { border-color: rgba(245,208,76,0.4); transform: translateY(-1px); }
    .bldg-card.next-up { border-color: rgba(245,208,76,0.5); background: rgba(245,208,76,0.04); }
    .bldg-card.selected { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(245,208,76,0.2); }
    .bldg-card-img { width: 64px; height: 64px; object-fit: contain; border-radius: 8px; }
    .bldg-card-name { font-size: 11px; font-weight: 700; color: var(--text); text-align: center; line-height: 1.35; word-break: break-word; }
    .bldg-card-footer { display: flex; align-items: center; justify-content: space-between; width: 100%; gap: 6px; }

    /* ── BUILDER DOTS ── */
    .bldg-builder-dot {
      width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: 9px; font-weight: 800; flex-shrink: 0;
    }
    .bldg-builder-dot[data-b="1"] { background: rgba(169,183,169,0.25); color: #A9B7A9; border: 1.5px solid #A9B7A9; }
    .bldg-builder-dot[data-b="2"] { background: rgba(177,142,169,0.25); color: #B18EA9; border: 1.5px solid #B18EA9; }
    .bldg-builder-dot[data-b="3"] { background: rgba(80,139,139,0.25);  color: #508B8B; border: 1.5px solid #508B8B; }
    .bldg-builder-dot[data-b="4"] { background: rgba(204,122,111,0.25); color: #CC7A6F; border: 1.5px solid #CC7A6F; }
    .bldg-builder-dot[data-b="5"] { background: rgba(168,153,230,0.25); color: #A899E6; border: 1.5px solid #A899E6; }
    .bldg-builder-dot[data-b="6"] { background: rgba(197,168,110,0.25); color: #C5A86E; border: 1.5px solid #C5A86E; }

    /* ── STATUS BADGES ── */
    .bldg-status-badge {
      font-size: 9px; font-weight: 800; padding: 3px 7px; border-radius: 6px;
      text-transform: uppercase; letter-spacing: .4px;
    }
    .bldg-status-badge.next    { background: rgba(245,208,76,0.2); color: var(--gold); }
    .bldg-status-badge.queued  { background: rgba(255,255,255,0.06); color: var(--text-dim); }

    /* ── EMPTY STATE ── */
    .bldg-empty {
      grid-column: 1 / -1; display: flex; flex-direction: column; align-items: center;
      padding: 48px 20px; color: var(--text-dim); font-size: 13px; font-weight: 500; gap: 8px;
    }
    .bldg-empty-icon { font-size: 32px; opacity: .4; }

    /* ── DETAIL MODAL ── */
    .detail-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 500;
      display: flex; align-items: flex-end; justify-content: center;
    }
    .detail-sheet {
      background: var(--surface); border-radius: 20px 20px 0 0; width: 100%; max-width: 520px;
      padding: 20px 20px 32px; max-height: 85vh; overflow-y: auto; position: relative;
      animation: slideUp .22s ease-out;
    }
    @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .detail-close {
      position: absolute; top: 16px; right: 16px;
      background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text-dim); font-size: 14px; width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .15s;
    }
    .detail-close:hover { color: var(--text); border-color: var(--gold); }
    .detail-drag-handle {
      width: 40px; height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px;
      margin: 0 auto 16px;
    }
    .detail-top { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
    .detail-big-img { width: 72px; height: 72px; object-fit: contain; border-radius: 10px; flex-shrink: 0; }
    .detail-header-info { flex: 1; min-width: 0; }
    .detail-name { font-size: 15px; font-weight: 800; color: var(--text); line-height: 1.3; margin-bottom: 8px; }
    .detail-badges { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .detail-cat-badge {
      font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 6px;
      background: rgba(255,255,255,0.06); color: var(--text-dim); text-transform: uppercase; letter-spacing: .3px;
    }
    .detail-divider { height: 1px; background: var(--border); margin: 14px 0; }
    .detail-section-label { font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 10px; }
    .detail-prev {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px;
    }
    .detail-prev-img { width: 38px; height: 38px; object-fit: contain; border-radius: 6px; flex-shrink: 0; }
    .detail-prev-name { font-size: 12px; font-weight: 700; color: var(--text); line-height: 1.3; }
    .detail-prev-time { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
    .detail-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-row-label { font-size: 12px; color: var(--text-dim); font-weight: 600; }
    .detail-row-val { font-size: 12px; color: var(--text); font-weight: 700; text-align: right; }
    .detail-row-val.gold { color: var(--gold); }
    .detail-jump-btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; margin-top: 16px; padding: 13px 20px;
      background: var(--gold); border: none; border-radius: 12px;
      color: #000; font-family: 'Lexend', sans-serif; font-size: 14px; font-weight: 800;
      cursor: pointer; transition: background .15s;
    }
    .detail-jump-btn:hover { background: #ffd700; }

    /* ── SEARCH MODAL ── */
    .search-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 500;
      display: flex; align-items: flex-start; justify-content: center; padding-top: 60px;
    }
    .search-sheet {
      background: var(--surface); border-radius: 16px; width: calc(100% - 32px);
      max-width: 500px; max-height: 75vh; display: flex; flex-direction: column; overflow: hidden;
      animation: slideDown .2s ease-out;
    }
    @keyframes slideDown { from { transform: translateY(-16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .search-sheet-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px 12px; border-bottom: 1px solid var(--border);
    }
    .search-sheet-header h3 { font-size: 15px; font-weight: 800; color: var(--text); }
    .search-close-x {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text-dim); font-size: 14px; width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .15s;
    }
    .search-close-x:hover { color: var(--text); border-color: var(--gold); }
    .search-input-wrap { padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .bldg-search-input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
      padding: 10px 14px; color: var(--text); font-family: 'Lexend', sans-serif; font-size: 14px;
      outline: none; transition: border-color .15s;
    }
    .bldg-search-input:focus { border-color: rgba(245,208,76,0.5); }
    .bldg-search-input::placeholder { color: var(--text-dim); }
    .search-results-list { overflow-y: auto; flex: 1; }
    .search-hint-msg { padding: 20px; color: var(--text-dim); font-size: 13px; text-align: center; }
    .bldg-search-result {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .12s;
    }
    .bldg-search-result:hover { background: rgba(255,255,255,0.03); }
    .bsr-icon { width: 36px; height: 36px; object-fit: contain; border-radius: 6px; flex-shrink: 0; }
    .bsr-info { flex: 1; min-width: 0; }
    .bsr-name { font-size: 12px; font-weight: 700; color: var(--text); }
    .bsr-meta { display: flex; gap: 8px; margin-top: 2px; }
    .bsr-meta span { font-size: 11px; color: var(--text-dim); font-weight: 600; }
    .search-builder-tag {
      font-size: 10px; font-weight: 800; padding: 2px 6px; border-radius: 5px;
      background: rgba(255,255,255,0.07); color: var(--text-dim);
    }
    .bsr-open-btn {
      flex-shrink: 0; padding: 6px 12px; border-radius: 8px;
      border: 1.5px solid rgba(245,208,76,0.4); background: rgba(245,208,76,0.08);
      color: var(--gold); font-family: 'Lexend', sans-serif; font-size: 11px; font-weight: 800;
      cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .bsr-open-btn:hover { background: rgba(245,208,76,0.2); border-color: var(--gold); }

    @media (max-width: 480px) {
      .bldg-grid { grid-template-columns: 1fr; gap: 10px; }
      .bldg-content { padding: 14px 14px 80px; }
      .cat-tabs { padding: 10px 14px; }
      .sort-bar { padding: 8px 14px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="bldg-header">
    <a href="index.html" class="back-btn">← Back</a>
    <span class="bldg-title">Buildings</span>
    <div class="header-actions">
      <button class="icon-action-btn" id="searchBtn" title="Search upgrades">
        <img src="Images/search.png" alt="Search">
      </button>
      <button class="refresh-btn" id="refreshBtn">⟳ Refresh</button>
    </div>
  </header>

  <!-- CATEGORY TABS -->
  <nav class="cat-tabs" id="catTabs">
    <button class="cat-tab active" data-cat="all">All</button>
    <button class="cat-tab" data-cat="1"><img class="tab-icon" src="Images/Upgrades/Cannon Lvl 1.png" alt="">Defenses</button>
    <button class="cat-tab" data-cat="2"><img class="tab-icon" src="Images/ged.png" alt="">Resources</button>
    <button class="cat-tab" data-cat="3"><img class="tab-icon" src="Images/CraftingStation.png" alt="">Craft. Def</button>
    <button class="cat-tab" data-cat="4"><img class="tab-icon" src="Images/Upgrades/Spring Trap Lvl 1&2.png" alt="">Traps</button>
    <button class="cat-tab" data-cat="5"><img class="tab-icon" src="Images/SCicon.png" alt="">Supercharged</button>
    <button class="cat-tab" data-cat="6"><img class="tab-icon" src="Images/Upgrades/Longshot.png" alt="">Guardians</button>
    <button class="cat-tab" data-cat="7"><img class="tab-icon" src="Images/Upgrades/Hero Hall Lvl 1.png" alt="">Heroes</button>
    <button class="cat-tab" data-cat="8"><img class="tab-icon" src="Images/Army.png" alt="">Army</button>
  </nav>

  <!-- SORT BAR -->
  <div class="sort-bar">
    <span class="sort-label">Sort</span>
    <button class="sort-btn active" data-sort="builder">Builder</button>
    <button class="sort-btn" data-sort="az">A → Z</button>
    <button class="sort-btn" data-sort="next">Next First</button>
  </div>

  <!-- MAIN CONTENT -->
  <main class="bldg-content">
    <div id="bldgStatus" class="bldg-status">
      <div class="bldg-spinner"></div>
      <span>Loading buildings…</span>
    </div>
    <div class="bldg-grid" id="bldgGrid" style="display:none;"></div>
  </main>

  <!-- DETAIL MODAL -->
  <div id="detailModal" class="detail-overlay" style="display:none;">
    <div class="detail-sheet" id="detailSheet">
      <div class="detail-drag-handle"></div>
      <button class="detail-close" id="detailClose">✕</button>
      <div id="detailContent"></div>
    </div>
  </div>

  <!-- SEARCH MODAL -->
  <div id="searchModal" class="search-overlay" style="display:none;">
    <div class="search-sheet">
      <div class="search-sheet-header">
        <h3>Search Upgrades</h3>
        <button class="search-close-x" id="searchClose">✕</button>
      </div>
      <div class="search-input-wrap">
        <input type="text" id="bldgSearchInput" class="bldg-search-input"
               placeholder="e.g. Archer Tower, X-Bow…" autocomplete="off" spellcheck="false">
      </div>
      <div class="search-results-list" id="bldgSearchResults">
        <div class="search-hint-msg">Type to search across all builders</div>
      </div>
    </div>
  </div>

  <script>
    /* ── CONFIG ── */
    const API_BASE = "https://script.google.com/macros/s/AKfycbzaxmuwpTD9cUzrz4e4k75caCpQrTjEDefs-B5nuEaqlFoMrBHjrhDun3Iy7kPkc9j2/exec";
    function endpoint(action) {
      return `${API_BASE}?action=${action}&username=${encodeURIComponent(window.COC_USERNAME)}`;
    }

    /* ── HERO NAMES ── */
    const HERO_NAMES = ["Barbarian King","Archer Queen","Grand Warden","Royal Champion","Minion Prince","Dragon Duke","Longshot"];

    /* ── IMAGE MAP ── */
    const IMAGE_MAP = {
      "Air Bomb":["Lvl 11&12","Lvl 13"],"Air Defense":["Lvl 16"],"Pet House":["Lvl 12"],
      "Archer Tower":["Lvl 21"],"Blacksmith":["Lvl 9"],"Bomb":["Lvl 11&12","Lvl 13&14"],
      "Bomb Tower":["Lvl 13"],"Builder Hut":["Level 7&8&9"],"Dark Elixir Drill":["Lvl 10","Lvl 11"],
      "Dark Elixir Storage":["Lvl 12","Lvl 13"],"Elixir Collector":["Lvl 17"],
      "Elixir Storage":["Lvl 18","Lvl 19"],"Giant Bomb":["Lvl 6","Lvl 7&8","Lvl 9&10","Lvl 11"],
      "Giga Bomb":["Lvl 2","Lvl 3","Lvl 4"],"Gold Mine":["Lvl 17"],
      "Gold Storage":["Lvl 18","Lvl 19"],"Hidden Tesla":["Lvl 16","Lvl 17"],
      "Monolith":["Lvl 2&3&4"],"Mortar":["Lvl 17","Lvl 18"],"Scattershot":["Lvl 6&7&8"],
      "Seeking Air Mine":["Lvl 5&6","Lvl 7&8"],"Spring Trap":["Lvl 7&8","Lvl 9&10","Lvl 11&12","Lvl 13"],
      "Town Hall":["Lvl 18"],
      "Wizard Tower":["Lvl 6","Lvl 7","Lvl 8","Lvl 9","Lvl 10","Lvl 11","Lvl 12","Lvl 13","Lvl 14","Lvl 15","Lvl 16","Lvl 17"],
      "Firespitter":["Lvl 3"],"Workshop":["Lvl 8"],"Spell Tower":["Lvl 4"],
      "Skeleton Trap":["Lvl 5"],"Inferno Tower":["Lvl 12"],"X-Bow":["Lvl 12&13&14"],
      "Hero Hall":["Lvl 11&12"],"Laboratory":["Lvl 16"],"Clan Castle":["Lvl 14"],
      "Revenge Tower":["Lvl 1","Lvl 2"],"Super Wizard Tower":["Lvl 1","Lvl 2"],
      "Ricochet Cannon":["Lvl 4"],"Multi-Archer Tower":["Lvl 4"],"Multi-Gear Tower":["Lvl 3"]
    };

    function getSuperchargeImage(name) {
      const base = name.match(/^(.+?)\s*(?:#\d+)?\s+Lvl\s+\*+$/i);
      if (!base) return "Images/Upgrades/PH.png";
      const bn = base[1].trim();
      if (!IMAGE_MAP[bn]) return "Images/Upgrades/PH.png";
      const entries = IMAGE_MAP[bn];
      return "Images/Upgrades/" + bn + " " + entries[entries.length - 1] + ".png";
    }

    function getUpgradeImage(name) {
      if (!name) return "Images/Upgrades/PH.png";
      for (const hero of HERO_NAMES) {
        if (name.includes(hero)) return "Images/Upgrades/" + hero + ".png";
      }
      const m = name.match(/^(.+?)\s*(?:#\d+)?\s+(?:Level|Lvl)\s+(\d+)/i);
      if (!m) return "Images/Upgrades/PH.png";
      const bn = m[1].trim(); const lvl = parseInt(m[2]);
      if (!IMAGE_MAP[bn]) return "Images/Upgrades/PH.png";
      for (const ls of IMAGE_MAP[bn]) {
        const nums = ls.match(/\d+/g)?.map(Number) || [];
        if (nums.includes(lvl)) return "Images/Upgrades/" + bn + " " + ls + ".png";
      }
      return "Images/Upgrades/PH.png";
    }

    /* ── FORMAT NAME: replace * with SC icon ── */
    function formatName(rawHtml) {
      return rawHtml.replace(/\*/g,
        '<img src="Images/SCicon.png" style="height:1em;vertical-align:middle;margin:0 1px;" alt="SC">');
    }

    /* ── ESCAPE ── */
    function esc(str) {
      return String(str || '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* ── PARSE SHEET DATE: "Apr 10 2:30 PM" → Date ── */
    function parseSheetDate(str) {
      if (!str || str === '—') return null;
      const m = str.match(/^(\w+)\s+(\d+)\s+(\d+):(\d+)\s*(AM|PM)$/i);
      if (!m) return null;
      const MONTHS = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
      const monIdx = MONTHS[m[1]];
      if (monIdx === undefined) return null;
      let hr = parseInt(m[3]);
      const min = parseInt(m[4]);
      if (m[5].toUpperCase() === 'PM' && hr !== 12) hr += 12;
      if (m[5].toUpperCase() === 'AM' && hr === 12) hr = 0;
      const year = new Date().getFullYear();
      const d = new Date(year, monIdx, parseInt(m[2]), hr, min, 0);
      // If it's in the past by more than 6 hours, assume next year
      if (d.getTime() < Date.now() - 6 * 3600000) {
        return new Date(year + 1, monIdx, parseInt(m[2]), hr, min, 0);
      }
      return d;
    }

    /* ── TIME UNTIL START ── */
    function formatTimeUntil(dateStr) {
      const d = parseSheetDate(dateStr);
      if (!d) return null;
      const diff = d.getTime() - Date.now();
      if (diff <= 0) return null; // already started
      const days = Math.floor(diff / 86400000);
      const hrs  = Math.floor((diff % 86400000) / 3600000);
      const mins = Math.floor((diff % 3600000) / 60000);
      if (days > 0) return `${days}d ${hrs}h ${mins}m`;
      if (hrs > 0)  return `${hrs}h ${mins}m`;
      return `${mins}m`;
    }

    /* ── CATEGORIES ── */
    const CATEGORIES = {"1":"Defenses","2":"Resources","3":"Craft. Defenses","4":"Traps","5":"Supercharged","6":"Guardians","7":"Heroes","8":"Army"};

    /* ── STATE ── */
    let allUpgrades   = [];
    let currentWorkMap = {}; // builderNum(int) → { upgrade, finishTimeStr }
    let activeTab     = 'all';
    let sortMode      = 'builder';
    let renderedList  = []; // the sorted+filtered list currently shown

    /* ── FETCH ── */
    async function fetchBuilderQueue(num) {
      const res  = await fetch(endpoint("builder_details") + "&builder=Builder_" + num);
      const data = await res.json();
      if (data.error || !data.upgrades) return [];
      return data.upgrades.map((u, idx) => ({ ...u, builderNum: num, queueIdx: idx }));
    }

    async function fetchCurrentWork() {
      try {
        const res  = await fetch(endpoint("current_work_table"));
        const rows = await res.json();
        if (!Array.isArray(rows)) return {};
        const map = {};
        for (let i = 1; i < rows.length; i++) {
          const row = rows[i];
          if (!row || !row[0]) continue;
          const m = String(row[0]).match(/(\d+)/);
          if (!m) continue;
          const bNum = parseInt(m[1]);
          const finishDate = row[2] ? new Date(row[2]) : null;
          let finishStr = '—';
          if (finishDate && !isNaN(finishDate.getTime())) {
            finishStr = finishDate.toLocaleString('en-US', {month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
          }
          map[bNum] = { upgrade: String(row[1] || ''), finishTimeStr: finishStr };
        }
        return map;
      } catch { return {}; }
    }

    async function loadBuildings() {
      showLoading(true);
      try {
        const [queues, cwMap] = await Promise.all([
          Promise.all([1,2,3,4,5,6].map(fetchBuilderQueue)),
          fetchCurrentWork()
        ]);
        currentWorkMap = cwMap;
        allUpgrades = [];
        queues.forEach(builderUpgrades => {
          builderUpgrades.forEach(u => {
            const typeB = u.TypeB_ID ?? u.typeB_ID ?? u.TypeBID ?? u.typeb_id ?? null;
            allUpgrades.push({ ...u, typeB: typeB ? String(typeB) : null });
          });
        });
        updateTabCounts();
        renderGrid();
        showLoading(false);
      } catch (err) {
        showError(err.message || 'Failed to load data');
      }
    }

    /* ── SORT ── */
    function getSorted(list) {
      const copy = [...list];
      if (sortMode === 'az') {
        copy.sort((a, b) => (a.upgrade || '').localeCompare(b.upgrade || ''));
      } else if (sortMode === 'next') {
        copy.sort((a, b) => a.queueIdx - b.queueIdx || a.builderNum - b.builderNum);
      } else {
        copy.sort((a, b) => a.builderNum - b.builderNum || a.queueIdx - b.queueIdx);
      }
      return copy;
    }

    /* ── TAB COUNTS ── */
    function updateTabCounts() {
      document.querySelectorAll('.cat-tab[data-cat]').forEach(tab => {
        const cat = tab.dataset.cat;
        tab.querySelector('.cat-count')?.remove();
        const count = cat === 'all'
          ? allUpgrades.length
          : allUpgrades.filter(u => u.typeB === cat).length;
        if (count > 0) {
          const chip = document.createElement('span');
          chip.className = 'cat-count';
          chip.textContent = count;
          tab.appendChild(chip);
        }
      });
    }

    /* ── PARSE BUILDING FROM UPGRADE NAME ── */
    function parseBuildingInfo(upgradeName) {
      if (!upgradeName) return null;
      // Match "Base Name #N Lvl X" or "Base Name Lvl X" (level can be digits or * for SC)
      const m = upgradeName.match(/^(.+?)\s*(?:#(\d+))?\s+(?:Lvl|Level)\s+(.+)$/i);
      if (!m) return null;
      const base     = m[1].trim();
      const instance = m[2] || null;
      const levelStr = m[3].replace(/\*/g, '').trim();
      const level    = parseInt(levelStr) || null;
      const isSC     = m[3].includes('*');
      const key      = instance ? `${base} #${instance}` : base;
      return { base, instance, level, isSC, key };
    }

    /* ── RENDER GRID (section per building type, cards per instance) ── */
    function renderGrid() {
      const grid = document.getElementById('bldgGrid');
      const filtered = activeTab === 'all'
        ? allUpgrades
        : allUpgrades.filter(u => u.typeB === activeTab);
      renderedList = getSorted(filtered);

      if (renderedList.length === 0) {
        grid.innerHTML = `<div class="bldg-empty"><div class="bldg-empty-icon">🏗️</div><span>No upgrades in this category</span></div>`;
        grid.style.display = '';
        return;
      }

      // Two-level grouping: base building name → instance key → upgrades
      const baseOrder = [];
      const baseMap   = new Map(); // baseName → { keyOrder: [], keyMap: Map }

      renderedList.forEach((u, idx) => {
        const info = parseBuildingInfo(u.upgrade || '');
        const base = info ? info.base : (u.upgrade || 'Unknown');
        const key  = info ? info.key  : (u.upgrade || 'Unknown');
        if (!baseMap.has(base)) { baseMap.set(base, { keyOrder: [], keyMap: new Map() }); baseOrder.push(base); }
        const section = baseMap.get(base);
        if (!section.keyMap.has(key)) { section.keyMap.set(key, []); section.keyOrder.push(key); }
        section.keyMap.get(key).push({ u, idx });
      });

      grid.innerHTML = baseOrder.map((base, si) => {
        const { keyOrder, keyMap } = baseMap.get(base);
        const cards = keyOrder.map(key => buildBuildingGroup(key, keyMap.get(key))).join('');
        return `<div class="bldg-section-header${si === 0 ? ' first' : ''}"><span>${esc(base)}</span></div>${cards}`;
      }).join('');

      grid.style.display = '';
    }

    /* ── BUILD BUILDING GROUP CARD ── */
    function buildBuildingGroup(buildingKey, entries) {
      const firstEntry = entries[0];
      const firstName  = firstEntry.u.upgrade || '';

      // Determine current level from the lowest-level upgrade in this group
      const sorted = [...entries].sort((a, b) => {
        const aI = parseBuildingInfo(a.u.upgrade || '');
        const bI = parseBuildingInfo(b.u.upgrade || '');
        return (aI?.level ?? 999) - (bI?.level ?? 999);
      });
      const lowestInfo = parseBuildingInfo(sorted[0].u.upgrade || '');
      let currentLevelStr = '—';
      if (lowestInfo) {
        if (lowestInfo.isSC) {
          currentLevelStr = 'Max level';
        } else if (lowestInfo.level !== null) {
          const cur = lowestInfo.level - 1;
          currentLevelStr = cur <= 0 ? 'New' : `Lvl ${cur}`;
        }
      }

      // Image: use the next-up upgrade if possible, otherwise first
      const nextEntry = entries.find(e => e.u.queueIdx === 0) || firstEntry;
      const nextName  = nextEntry.u.upgrade || '';
      const isSCFirst = nextName.includes('*');
      const imgSrc    = isSCFirst ? getSuperchargeImage(nextName) : getUpgradeImage(nextName);

      const hasNext = entries.some(e => e.u.queueIdx === 0);

      const upgradeRows = [...entries].sort((a, b) => {
        const aI = parseBuildingInfo(a.u.upgrade || '');
        const bI = parseBuildingInfo(b.u.upgrade || '');
        if (aI?.isSC && !bI?.isSC) return 1;
        if (!aI?.isSC && bI?.isSC) return -1;
        return (aI?.level ?? 0) - (bI?.level ?? 0);
      }).map(({ u, idx }) => {
        const uInfo  = parseBuildingInfo(u.upgrade || '');
        const uIsSC  = u.upgrade?.includes('*');
        const isNext = u.queueIdx === 0;

        let lvlDisplay;
        if (uIsSC) {
          const scStars = ((u.upgrade || '').match(/Lvl\s+(\*+)/i) || [])[1] || '*';
          const scIcons = scStars.split('').map(() => `<img src="Images/SCicon.png" style="height:1em;vertical-align:middle;margin:0 1px;" alt="SC">`).join('');
          lvlDisplay = `${scIcons} Supercharge`;
        } else if (uInfo && uInfo.level !== null) {
          lvlDisplay = `Lvl ${uInfo.level}`;
        } else {
          lvlDisplay = esc(u.upgrade || '');
        }

        return `
          <div class="bbg-upgrade-row${isNext ? ' next-row' : ''}" data-idx="${idx}">
            <div class="bbg-lvl-label">
              <span class="bbg-lvl-arrow">→</span>
              ${lvlDisplay}
            </div>
            <div class="bbg-row-meta">
              <div class="bldg-builder-dot" data-b="${u.builderNum}">B${u.builderNum}</div>
              <span class="bldg-status-badge ${isNext ? 'next' : 'queued'}">${isNext ? 'Next Up' : 'Queued'}</span>
            </div>
          </div>`;
      }).join('');

      return `
        <div class="bldg-building-group${hasNext ? ' has-next' : ''}">
          <div class="bbg-header">
            <img src="${esc(imgSrc)}" alt="" class="bbg-img" onerror="this.src='Images/Upgrades/PH.png'" />
            <div class="bbg-info">
              <div class="bbg-title">${esc(buildingKey)}</div>
              <div class="bbg-cur-level">Current: ${currentLevelStr}</div>
            </div>
          </div>
          <div class="bbg-upgrades">${upgradeRows}</div>
        </div>`;
    }

    /* ── DETAIL MODAL ── */
    function prefetchIndexResources() {
      if (document.querySelector('link[data-prefetch-index]')) return;
      ['index.html', 'script.js', 'style.css'].forEach(href => {
        const link = document.createElement('link');
        link.rel = 'prefetch';
        link.href = href;
        link.dataset.prefetchIndex = '1';
        document.head.appendChild(link);
      });
    }

    function openDetail(u) {
      prefetchIndexResources();
      const name   = u.upgrade || '';
      const isSC   = name.includes('*');
      const imgSrc = isSC ? getSuperchargeImage(name) : getUpgradeImage(name);
      const bNum   = u.builderNum;
      const isNext = u.queueIdx === 0;
      const catLabel = u.typeB ? (CATEGORIES[u.typeB] || 'Other') : 'Uncategorized';

      /* Previous upgrade */
      let prevHtml = '';
      if (u.queueIdx === 0) {
        const active = currentWorkMap[bNum];
        if (active && active.upgrade) {
          const aImg = getUpgradeImage(active.upgrade);
          prevHtml = `
            <div class="detail-divider"></div>
            <div class="detail-section-label">Finishes before this starts</div>
            <div class="detail-prev">
              <img src="${esc(aImg)}" class="detail-prev-img" onerror="this.src='Images/Upgrades/PH.png'" alt="">
              <div>
                <div class="detail-prev-name">${formatName(esc(active.upgrade))}</div>
                <div class="detail-prev-time">Ends: ${esc(active.finishTimeStr)}</div>
              </div>
            </div>`;
        }
      } else {
        const prev = allUpgrades.find(x => x.builderNum === bNum && x.queueIdx === u.queueIdx - 1);
        if (prev) {
          const pImg = prev.upgrade?.includes('*') ? getSuperchargeImage(prev.upgrade) : getUpgradeImage(prev.upgrade || '');
          prevHtml = `
            <div class="detail-divider"></div>
            <div class="detail-section-label">Finishes before this starts</div>
            <div class="detail-prev">
              <img src="${esc(pImg)}" class="detail-prev-img" onerror="this.src='Images/Upgrades/PH.png'" alt="">
              <div>
                <div class="detail-prev-name">${formatName(esc(prev.upgrade || ''))}</div>
                <div class="detail-prev-time">Ends: ${esc(prev.end || '—')}</div>
              </div>
            </div>`;
        }
      }

      /* Time until start */
      const timeUntil = formatTimeUntil(u.start);

      document.getElementById('detailContent').innerHTML = `
        <div class="detail-top">
          <img src="${esc(imgSrc)}" class="detail-big-img" onerror="this.src='Images/Upgrades/PH.png'" alt="">
          <div class="detail-header-info">
            <div class="detail-name">${formatName(esc(name))}</div>
            <div class="detail-badges">
              <div class="bldg-builder-dot" data-b="${bNum}">B${bNum}</div>
              <span class="bldg-status-badge ${isNext ? 'next' : 'queued'}">${isNext ? 'Next Up' : 'Queued'}</span>
              <span class="detail-cat-badge">${esc(catLabel)}</span>
            </div>
          </div>
        </div>

        ${prevHtml}

        <div class="detail-divider"></div>
        <div class="detail-section-label">Schedule</div>
        <div class="detail-row">
          <span class="detail-row-label">Starts</span>
          <span class="detail-row-val">${esc(u.start || '—')}</span>
        </div>
        <div class="detail-row">
          <span class="detail-row-label">Ends</span>
          <span class="detail-row-val">${esc(u.end || '—')}</span>
        </div>
        <div class="detail-row">
          <span class="detail-row-label">Duration</span>
          <span class="detail-row-val">${esc(u.duration || '—')}</span>
        </div>
        ${timeUntil ? `
        <div class="detail-row">
          <span class="detail-row-label">Starts in</span>
          <span class="detail-row-val gold">${esc(timeUntil)}</span>
        </div>` : ''}

        <button class="detail-jump-btn" id="detailJumpBtn"
                data-builder="${bNum}" data-upgrade="${esc(name)}">
          Jump to Builder ${bNum} ↗
        </button>`;

      document.getElementById('detailModal').style.display = 'flex';

      document.getElementById('detailJumpBtn').addEventListener('click', () => {
        const btn = document.getElementById('detailJumpBtn');
        jumpToBuilder(btn.dataset.builder, btn.dataset.upgrade);
      });
    }

    function closeDetail() {
      document.getElementById('detailModal').style.display = 'none';
      document.querySelectorAll('.bbg-upgrade-row.selected').forEach(r => r.classList.remove('selected'));
    }

    /* ── JUMP TO BUILDER (cross-page) ── */
    function jumpToBuilder(builderNum, upgradeName) {
      localStorage.setItem('bldg_jump', JSON.stringify({
        builder: String(builderNum),
        upgrade: upgradeName
      }));
      window.location.href = 'index.html';
    }

    /* ── SEARCH ── */
    let searchTimer = null;

    function openSearch() {
      document.getElementById('searchModal').style.display = 'flex';
      setTimeout(() => document.getElementById('bldgSearchInput')?.focus(), 60);
    }

    function closeSearch() {
      document.getElementById('searchModal').style.display = 'none';
      document.getElementById('bldgSearchInput').value = '';
      document.getElementById('bldgSearchResults').innerHTML = '<div class="search-hint-msg">Type to search across all builders</div>';
    }

    function performSearch(query) {
      const resultsEl = document.getElementById('bldgSearchResults');
      if (!query || query.trim().length < 2) {
        resultsEl.innerHTML = '<div class="search-hint-msg">Type at least 2 characters</div>';
        return;
      }
      const q = query.trim().toLowerCase();
      const matches = allUpgrades.filter(u => (u.upgrade || '').toLowerCase().includes(q));

      if (matches.length === 0) {
        resultsEl.innerHTML = `<div class="search-hint-msg">No results for "<strong style="color:#ccc">${esc(query)}</strong>"</div>`;
        return;
      }

      resultsEl.innerHTML = matches.map((u, i) => {
        const isSC  = u.upgrade?.includes('*');
        const img   = isSC ? getSuperchargeImage(u.upgrade) : getUpgradeImage(u.upgrade || '');
        return `
          <div class="bldg-search-result" data-result-idx="${i}">
            <img src="${esc(img)}" class="bsr-icon" onerror="this.src='Images/Upgrades/PH.png'" alt="">
            <div class="bsr-info">
              <div class="bsr-name">${formatName(esc(u.upgrade || ''))}</div>
              <div class="bsr-meta">
                <span class="search-builder-tag">Builder ${u.builderNum}</span>
                <span>${esc(u.duration || '')}</span>
              </div>
            </div>
            <button class="bsr-open-btn" data-result-idx="${i}">Open ↗</button>
          </div>`;
      }).join('');

      // Store matches for click lookup
      resultsEl._matches = matches;
    }

    /* ── UI HELPERS ── */
    function showLoading(on) {
      document.getElementById('bldgStatus').style.display = on ? '' : 'none';
      document.getElementById('bldgGrid').style.display   = on ? 'none' : '';
    }

    function showError(msg) {
      const el = document.getElementById('bldgStatus');
      el.style.display = '';
      el.innerHTML = `<div style="font-size:24px;opacity:.5">⚠️</div><span>${esc(msg)}</span>`;
      document.getElementById('bldgGrid').style.display = 'none';
    }

    /* ── EVENT WIRING ── */

    // Tabs
    document.getElementById('catTabs').addEventListener('click', e => {
      const tab = e.target.closest('.cat-tab');
      if (!tab) return;
      document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeTab = tab.dataset.cat;
      closeDetail();
      renderGrid();
    });

    // Sort
    document.querySelector('.sort-bar').addEventListener('click', e => {
      const btn = e.target.closest('.sort-btn');
      if (!btn) return;
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      sortMode = btn.dataset.sort;
      renderGrid();
    });

    // Upgrade row click → detail
    document.getElementById('bldgGrid').addEventListener('click', e => {
      const row = e.target.closest('.bbg-upgrade-row');
      if (!row) return;
      const idx = parseInt(row.dataset.idx);
      const u   = renderedList[idx];
      if (!u) return;
      document.querySelectorAll('.bbg-upgrade-row.selected').forEach(r => r.classList.remove('selected'));
      row.classList.add('selected');
      openDetail(u);
    });

    // Detail modal close
    document.getElementById('detailClose').addEventListener('click', closeDetail);
    document.getElementById('detailModal').addEventListener('click', e => {
      if (e.target === document.getElementById('detailModal')) closeDetail();
    });

    // Search button
    document.getElementById('searchBtn').addEventListener('click', openSearch);
    document.getElementById('searchClose').addEventListener('click', closeSearch);
    document.getElementById('searchModal').addEventListener('click', e => {
      if (e.target === document.getElementById('searchModal')) closeSearch();
    });

    // Search input
    document.getElementById('bldgSearchInput').addEventListener('input', e => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => performSearch(e.target.value), 250);
    });

    // Search result click
    document.getElementById('bldgSearchResults').addEventListener('click', e => {
      const btn = e.target.closest('.bsr-open-btn');
      if (!btn) return;
      const idx     = parseInt(btn.dataset.resultIdx);
      const matches = document.getElementById('bldgSearchResults')._matches;
      if (!matches || !matches[idx]) return;
      closeSearch();
      openDetail(matches[idx]);
    });

    // Refresh
    document.getElementById('refreshBtn').addEventListener('click', async () => {
      const btn = document.getElementById('refreshBtn');
      btn.classList.add('loading'); btn.textContent = '…';
      await loadBuildings();
      btn.classList.remove('loading'); btn.textContent = '⟳ Refresh';
    });

    // ESC to close modals
    document.addEventListener('keydown', e => {
      if (e.key !== 'Escape') return;
      if (document.getElementById('detailModal').style.display !== 'none') { closeDetail(); return; }
      if (document.getElementById('searchModal').style.display !== 'none') { closeSearch(); return; }
    });

    /* ── INIT ── */
    document.addEventListener('DOMContentLoaded', () => {
      const username = localStorage.getItem('coc_username');
      if (!username) { window.location.href = 'index.html'; return; }
      window.COC_USERNAME = username;
      loadBuildings();
      setupPullToRefresh(loadBuildings);
    });

    function setupPullToRefresh(onRefresh) {
      const THRESHOLD = 80;
      let startY = 0, dist = 0, active = false;
      const bar = document.createElement('div');
      bar.className = 'ptr-bar';
      document.body.prepend(bar);
      function onStart(y) { if (window.scrollY !== 0) return; startY = y; dist = 0; active = true; }
      function onMove(y)  { if (!active) return; dist = Math.max(0, y - startY); bar.style.setProperty('--ptr-p', Math.min(dist / THRESHOLD, 1)); bar.classList.toggle('ptr-ready', dist >= THRESHOLD); }
      async function onEnd() {
        if (!active) return; active = false;
        if (dist < THRESHOLD) { bar.style.setProperty('--ptr-p', 0); bar.classList.remove('ptr-ready'); return; }
        bar.classList.remove('ptr-ready'); bar.classList.add('ptr-loading');
        await onRefresh();
        bar.classList.remove('ptr-loading'); bar.style.setProperty('--ptr-p', 0); dist = 0;
      }
      document.addEventListener('touchstart', e => onStart(e.touches[0].clientY), { passive: true });
      document.addEventListener('touchmove',  e => onMove(e.touches[0].clientY),  { passive: true });
      document.addEventListener('touchend',   onEnd);
      document.addEventListener('mousedown', e => onStart(e.clientY));
      document.addEventListener('mousemove', e => { if (active) onMove(e.clientY); });
      document.addEventListener('mouseup',   onEnd);
    }
  </script>
</body>
</html>
